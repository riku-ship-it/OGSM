<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OGSM 策略看板</title>
<style>
/* ===================== Reset & Base ===================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --teal:   #1D9E75;
  --blue:   #378ADD;
  --amber:  #BA7517;
  --coral:  #D85A30;
  --purple: #534AB7;
  --bg:     #F4F5F7;
  --surface:#FFFFFF;
  --border: #E2E5EA;
  --text:   #1A1D23;
  --muted:  #6B7280;
  --radius: 12px;
  --shadow: 0 1px 4px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.05);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC',
               'Noto Sans TC', 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ===================== Top Bar ===================== */
.topbar {
  background: #1A1D23;
  color: #fff;
  padding: 14px 32px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 200;
}
.topbar-title { font-size: 16px; font-weight: 700; letter-spacing: -.2px; flex: 1; }
.topbar-meta  { font-size: 12px; color: rgba(255,255,255,.5); }

.btn-add-goal {
  display: flex; align-items: center; gap: 6px;
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: background .15s;
  flex-shrink: 0;
}
.btn-add-goal:hover { background: #2563EB; }

.btn-filter {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,.12);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: background .15s;
}
.btn-filter:hover { background: rgba(255,255,255,.2); }

/* ===================== Objective Banner ===================== */
.obj-banner {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 20px 32px;
  display: flex;
  align-items: center;
  gap: 20px;
}
.obj-tag {
  background: #EEF0FF;
  color: var(--purple);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .5px;
  padding: 4px 10px;
  border-radius: 6px;
  flex-shrink: 0;
}
.obj-title { font-size: 18px; font-weight: 700; flex: 1; }
.obj-ring-wrap { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.obj-ring-label { font-size: 13px; color: var(--muted); }
.ring-svg { transform: rotate(-90deg); }
.ring-bg   { fill: none; stroke: var(--border); stroke-width: 4; }
.ring-fill { fill: none; stroke: var(--purple); stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset .5s ease; }
.ring-pct  {
  font-size: 12px; font-weight: 700; fill: var(--purple);
  dominant-baseline: middle; text-anchor: middle;
  transform: rotate(90deg);
}

/* ===================== Main Layout ===================== */
.main-content {
  max-width: 900px;
  margin: 0 auto;
  padding: 28px 32px 60px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* ===================== Goal Block ===================== */
.goal-block {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}

.goal-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 20px;
  cursor: pointer;
  user-select: none;
  background: var(--surface);
  transition: background .15s;
  border-left: 4px solid var(--goal-color, var(--blue));
}
.goal-header:hover { background: #FAFBFC; }

.goal-badge {
  background: var(--goal-color, var(--blue));
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .4px;
  padding: 3px 8px;
  border-radius: 6px;
  flex-shrink: 0;
  white-space: nowrap;
}

.goal-name {
  font-size: 15px;
  font-weight: 700;
  flex: 1;
  min-width: 0;
}

.goal-progress-area {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  min-width: 160px;
}
.goal-bar-label { font-size: 12px; color: var(--muted); white-space: nowrap; }
.goal-bar-wrap  {
  flex: 1;
  height: 6px;
  background: var(--border);
  border-radius: 99px;
  overflow: hidden;
  min-width: 80px;
}
.goal-bar-fill {
  height: 100%;
  border-radius: 99px;
  background: var(--goal-color, var(--blue));
  transition: width .4s ease;
}
.goal-pct {
  font-size: 13px;
  font-weight: 700;
  color: var(--goal-color, var(--blue));
  min-width: 36px;
  text-align: right;
}

.chevron {
  font-size: 12px;
  color: var(--muted);
  transition: transform .2s;
  flex-shrink: 0;
}
.chevron.open { transform: rotate(180deg); }

/* ===================== Goal Body (collapsible) ===================== */
.goal-body {
  border-top: 1px solid var(--border);
  padding: 0;
  display: none;
}
.goal-body.open { display: block; }

.strategy-section { border-bottom: 1px solid var(--border); }
.strategy-section:last-child { border-bottom: none; }

.strategy-header-row {
  padding: 14px 20px 10px;
}
.strategy-tag {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .5px;
  color: var(--goal-color, var(--blue));
  background: color-mix(in srgb, var(--goal-color, var(--blue)) 10%, transparent);
  padding: 3px 8px;
  border-radius: 5px;
  margin-bottom: 4px;
}
.strategy-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.4;
}
.strategy-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* ===================== Action Table ===================== */
.action-table-wrap { padding: 0 20px 14px; }

.action-table-head {
  display: grid;
  grid-template-columns: 1fr 100px 90px 100px 80px;
  gap: 8px;
  padding: 6px 12px;
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: .4px;
  text-transform: uppercase;
}

.action-row {
  display: grid;
  grid-template-columns: 1fr 100px 90px 100px 80px;
  gap: 8px;
  padding: 10px 12px;
  border-radius: 8px;
  align-items: center;
  cursor: pointer;
  transition: background .15s;
}
.action-row:hover { background: #F3F4F6; }

.action-row-name { font-size: 13px; font-weight: 600; color: var(--text); }

.assignee-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  color: var(--text);
}
.avatar {
  width: 20px; height: 20px;
  border-radius: 50%;
  font-size: 9px;
  font-weight: 700;
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.due-date-txt { font-size: 12px; color: var(--muted); }

.mini-progress {
  display: flex; align-items: center; gap: 6px;
}
.mini-bar-wrap {
  flex: 1;
  height: 4px;
  background: var(--border);
  border-radius: 99px;
  overflow: hidden;
}
.mini-bar-fill {
  height: 100%;
  border-radius: 99px;
  background: var(--goal-color, var(--blue));
  transition: width .4s ease;
}

/* ===================== Status Badge ===================== */
.badge {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 99px;
  white-space: nowrap;
}
.badge-未開始 { background: #F1F3F5; color: #6B7280; }
.badge-進行中 { background: #DBEAFE; color: #1D4ED8; }
.badge-完成   { background: #D1FAE5; color: #065F46; }
.badge-卡關   { background: #FEE2E2; color: #B91C1C; }

.btn-add-action {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  margin: 2px 20px 14px;
  font-size: 12px;
  font-weight: 600;
  color: var(--goal-color, var(--blue));
  background: none;
  border: 1.5px dashed color-mix(in srgb, var(--goal-color, var(--blue)) 40%, transparent);
  border-radius: 7px;
  padding: 6px 14px;
  cursor: pointer;
  font-family: inherit;
  transition: background .15s, border-color .15s;
}
.btn-add-action:hover {
  background: color-mix(in srgb, var(--goal-color, var(--blue)) 6%, transparent);
  border-color: var(--goal-color, var(--blue));
}

/* ===================== Collapsed hint ===================== */
.goal-hint {
  font-size: 12px;
  color: var(--muted);
  padding: 10px 20px;
  border-top: 1px solid var(--border);
  background: #FAFBFC;
}

/* ===================== Empty ===================== */
.empty-board {
  text-align: center;
  padding: 64px 24px;
  color: var(--muted);
  font-size: 14px;
}
.empty-board p { margin-top: 8px; font-size: 13px; }

/* ===================== Loading ===================== */
.loading-screen {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 40vh; gap: 12px; color: var(--muted);
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===================== Modal (edit action) ===================== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.4);
  z-index: 500;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }

.modal {
  background: var(--surface);
  border-radius: 14px;
  width: 100%; max-width: 480px;
  box-shadow: 0 8px 40px rgba(0,0,0,.2);
  transform: translateY(12px);
  transition: transform .2s;
  overflow: hidden;
}
.modal-overlay.open .modal { transform: translateY(0); }

.modal-header {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
}
.modal-title { font-size: 15px; font-weight: 700; line-height: 1.4; }
.modal-sub   { font-size: 12px; color: var(--muted); margin-top: 2px; }
.modal-close {
  background: none; border: none; cursor: pointer;
  color: var(--muted); font-size: 20px; line-height: 1;
  padding: 2px 4px; border-radius: 4px;
  transition: background .15s; flex-shrink: 0;
}
.modal-close:hover { background: var(--border); }

.modal-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--muted); }
.form-input, .form-select {
  width: 100%; padding: 9px 12px;
  border: 1.5px solid var(--border);
  border-radius: 7px;
  font-size: 14px; font-family: inherit;
  color: var(--text); background: var(--surface);
  transition: border-color .15s; outline: none;
}
.form-input:focus, .form-select:focus { border-color: var(--blue); }
.progress-row { display: flex; align-items: center; gap: 10px; }
.progress-row input[type=range] { flex: 1; accent-color: var(--blue); }
.pct-display { font-size: 14px; font-weight: 700; min-width: 36px; text-align: right; }

.modal-footer {
  padding: 12px 20px 18px;
  display: flex; gap: 10px; justify-content: flex-end;
}
.btn { padding: 9px 20px; border-radius: 7px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: opacity .15s, background .15s; font-family: inherit; }
.btn:disabled { opacity: .5; cursor: not-allowed; }
.btn-cancel { background: var(--border); color: var(--text); }
.btn-cancel:hover:not(:disabled) { background: #D1D5DB; }
.btn-save   { background: var(--blue); color: #fff; }
.btn-save:hover:not(:disabled)   { background: #2563EB; }

/* ===================== Add Goal Modal ===================== */
.modal-add-goal .modal { max-width: 500px; }

/* ===================== Toast ===================== */
.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(10px);
  background: #1A1D23; color: #fff;
  padding: 10px 20px; border-radius: 99px;
  font-size: 13px; font-weight: 500;
  opacity: 0; pointer-events: none;
  transition: opacity .25s, transform .25s; z-index: 600; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error { background: #B91C1C; }

/* Responsive */
@media (max-width: 640px) {
  .topbar, .obj-banner, .main-content { padding-left: 16px; padding-right: 16px; }
  .action-table-head { display: none; }
  .action-row { grid-template-columns: 1fr auto; }
  .action-row > *:nth-child(2),
  .action-row > *:nth-child(3),
  .action-row > *:nth-child(4) { display: none; }
  .goal-progress-area { min-width: 120px; }
}
</style>
</head>

const COLOR_MAP = {
  teal:   '#1D9E75',
  blue:   '#378ADD',
  amber:  '#BA7517',
  coral:  '#D85A30',
  purple: '#534AB7',
};

const AVATAR_COLORS = ['#378ADD','#1D9E75','#BA7517','#D85A30','#534AB7','#0F766E','#7C3AED'];
const avatarColorCache = {};
function avatarColor(name) {
  if (!avatarColorCache[name]) {
    const idx = Object.keys(avatarColorCache).length % AVATAR_COLORS.length;
    avatarColorCache[name] = AVATAR_COLORS[idx];
  }
  return avatarColorCache[name];
}
function initials(name) {
  return name ? name.slice(0, 2) : '—';
}

// ===================================================
//  State
// ===================================================
let state = { objectives: [], goals: [], actions: [] };
let editingActionId   = null;
let addingToGoalId    = null;
let expandedGoals     = new Set();

// ===================================================
//  Fetch / Post
// ===================================================
async function fetchData() {
  const res  = await fetch(GAS_URL, { method: 'GET' });
  return await res.json();
}

async function postData(payload) {
  const res = await fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify(payload),
  });
  return await res.json();
}

// ===================================================
//  Render Objective Banner
// ===================================================
function renderBanner(objectives, goals) {
  const obj = objectives[0] || { title: '（尚無目標）' };
  const avg = goals.length
    ? Math.round(goals.reduce((s, g) => s + (g.progress || 0), 0) / goals.length)
    : 0;

  document.getElementById('obj-title-text').textContent = obj.title;
  document.getElementById('obj-banner').style.display   = 'flex';

  // top bar meta
  const year = new Date().getFullYear();
  document.getElementById('topbar-meta').textContent =
    `${year} 年度・${goals.length} 個 Goal・${state.actions.length} 項行動`;

  // ring
  const circumference = 2 * Math.PI * 20; // r=20
  const offset = circumference * (1 - avg / 100);
  document.getElementById('ring-fill').style.strokeDashoffset = offset;
  document.getElementById('ring-pct').textContent = avg + '%';
}

// ===================================================
//  Render Board
// ===================================================
function renderBoard(goals, actions) {
  const board = document.getElementById('main-content');
  board.innerHTML = '';

  if (!goals.length) {
    board.innerHTML = `
      <div class="empty-board">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#D1D5DB" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M12 8v8M8 12h8"/></svg>
        <p>尚無支線資料，請點選右上角「+ 新增 Goal」開始。</p>
      </div>`;
    return;
  }

  goals.forEach((goal, idx) => {
    const color = COLOR_MAP[goal.color] || COLOR_MAP.blue;
    const isOpen = expandedGoals.has(goal.id) || idx === 0; // first one open by default
    if (idx === 0 && !expandedGoals.has(goal.id)) expandedGoals.add(goal.id);

    const goalActions = actions.filter(a => a.goal_id === goal.id);
    const groups = groupBy(goalActions, 'strategy_name');

    const block = document.createElement('div');
    block.className = 'goal-block';
    block.dataset.goalId = goal.id;

    // ---- Header ----
    const header = document.createElement('div');
    header.className = 'goal-header';
    header.style.setProperty('--goal-color', color);
    header.innerHTML = `
      <span class="goal-badge" style="background:${color}">Goal ${idx + 1}</span>
      <span class="goal-name">${escHtml(goal.name)}</span>
      <div class="goal-progress-area">
        <span class="goal-bar-label">Dashboard 進度</span>
        <div class="goal-bar-wrap">
          <div class="goal-bar-fill" style="width:${goal.progress}%;background:${color}"></div>
        </div>
        <span class="goal-pct" style="color:${color}">${goal.progress}%</span>
      </div>
      <span class="chevron ${isOpen ? 'open' : ''}">▼</span>
    `;
    header.addEventListener('click', () => toggleGoal(goal.id, block, color));
    block.appendChild(header);

    // ---- Body ----
    const body = document.createElement('div');
    body.className = 'goal-body' + (isOpen ? ' open' : '');
    body.style.setProperty('--goal-color', color);

    if (!goalActions.length) {
      body.innerHTML = `<div style="padding:20px;font-size:13px;color:var(--muted);">此 Goal 尚無行動項目</div>`;
    } else {
      Object.entries(groups).forEach(([stratName, acts], sIdx) => {
        const sec = document.createElement('div');
        sec.className = 'strategy-section';
        sec.style.setProperty('--goal-color', color);

        const actionRows = acts.map(a => `
          <div class="action-row" data-id="${escHtml(a.id)}" onclick="openEditModal('${escHtml(a.id)}')">
            <span class="action-row-name">${escHtml(a.action_name)}</span>
            <span class="assignee-chip">
              ${a.assignee ? `<span class="avatar" style="background:${avatarColor(a.assignee)}">${initials(a.assignee)}</span>${escHtml(a.assignee)}` : '<span style="color:var(--muted)">—</span>'}
            </span>
            <span class="due-date-txt">${a.due_date || '—'}</span>
            <div class="mini-progress">
              <div class="mini-bar-wrap"><div class="mini-bar-fill" style="width:${a.progress}%;background:${color}"></div></div>
              <span style="font-size:11px;font-weight:600;color:var(--muted);min-width:28px;text-align:right">${a.progress}%</span>
            </div>
            <span class="badge badge-${escHtml(a.status)}">${escHtml(a.status)}</span>
          </div>
        `).join('');

        sec.innerHTML = `
          <div class="strategy-header-row">
            <div class="strategy-tag">S${sIdx + 1}</div>
            <div class="strategy-name">${escHtml(stratName)}</div>
            <div class="strategy-sub">Action plan</div>
          </div>
          <div class="action-table-wrap">
            <div class="action-table-head">
              <span>行動項目</span><span>負責人</span><span>截止日</span><span>進度</span><span>狀態</span>
            </div>
            ${actionRows}
          </div>
        `;
        body.appendChild(sec);
      });
    }

    // Add action button
    const addBtn = document.createElement('button');
    addBtn.className = 'btn-add-action';
    addBtn.style.setProperty('--goal-color', color);
    addBtn.innerHTML = `<svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2a1 1 0 011 1v4h4a1 1 0 010 2H9v4a1 1 0 01-2 0V9H3a1 1 0 010-2h4V3a1 1 0 011-1z"/></svg> 新增行動項目`;
    addBtn.onclick = (e) => { e.stopPropagation(); openAddActionModal(goal.id, goal.name); };
    body.appendChild(addBtn);

    block.appendChild(body);
    board.appendChild(block);
  });
}

function toggleGoal(goalId, block, color) {
  const body    = block.querySelector('.goal-body');
  const chevron = block.querySelector('.chevron');
  const isOpen  = expandedGoals.has(goalId);

  if (isOpen) {
    expandedGoals.delete(goalId);
    body.classList.remove('open');
    chevron.classList.remove('open');
  } else {
    expandedGoals.add(goalId);
    body.classList.add('open');
    chevron.classList.add('open');
  }
}

// ===================================================
//  Edit Action Modal
// ===================================================
function openEditModal(actionId) {
  const a = state.actions.find(x => x.id === actionId);
  if (!a) return;
  editingActionId = actionId;

  document.getElementById('edit-modal-title').textContent = a.action_name;
  document.getElementById('edit-modal-sub').textContent   = a.strategy_name;
  document.getElementById('edit-progress').value          = a.progress;
  document.getElementById('edit-progress-display').textContent = a.progress + '%';
  document.getElementById('edit-status').value            = a.status;
  document.getElementById('edit-assignee').value          = a.assignee || '';
  document.getElementById('edit-due-date').value          = a.due_date || '';
  document.getElementById('edit-action-name').value       = a.action_name || '';

  openOverlay('modal-edit');
}
function closeEditModal() { closeOverlay('modal-edit'); editingActionId = null; }

async function saveEditModal() {
  if (!editingActionId) return;
  const btn = document.getElementById('edit-save-btn');
  btn.disabled = true; btn.textContent = '儲存中…';

  const payload = {
    type:        'update_action',
    id:          editingActionId,
    progress:    Number(document.getElementById('edit-progress').value),
    status:      document.getElementById('edit-status').value,
    assignee:    document.getElementById('edit-assignee').value.trim(),
    due_date:    document.getElementById('edit-due-date').value,
    action_name: document.getElementById('edit-action-name').value.trim(),
  };

  try {
    const res = await postData(payload);
    if (res.success) {
      showToast('✅ 更新成功');
      closeEditModal();
      await loadAndRender();
    } else {
      showToast('❌ ' + (res.message || '更新失敗'), true);
    }
  } catch (e) {
    showToast('❌ 網路錯誤：' + e.message, true);
  } finally {
    btn.disabled = false; btn.textContent = '儲存更新';
  }
}

// ===================================================
//  Add Goal Modal
// ===================================================
function openAddGoalModal() { openOverlay('modal-add-goal'); }
function closeAddGoalModal() { closeOverlay('modal-add-goal'); }

async function saveNewGoal() {
  const name     = document.getElementById('new-goal-name').value.trim();
  const color    = document.getElementById('new-goal-color').value;
  const progress = Number(document.getElementById('new-goal-progress').value);
  if (!name) { showToast('❌ 請填寫支線名稱', true); return; }

  const btn = document.getElementById('add-goal-save-btn');
  btn.disabled = true; btn.textContent = '新增中…';

  // Build new IDs based on existing data
  const obj = state.objectives[0] || { id: '1' };
  const newGoalId = 'G' + (state.goals.length + 1);
  const newActId  = 'A' + (state.actions.length + 1);

  const payload = {
    type:        'add_goal',
    obj_id:      obj.id,
    obj_title:   obj.title,
    goal_id:     newGoalId,
    goal_name:   name,
    goal_progress: progress,
    goal_color:  color,
    action_id:   newActId,   // placeholder row required by sheet structure
  };

  try {
    const res = await postData(payload);
    if (res.success) {
      showToast('✅ 新增成功');
      closeAddGoalModal();
      // reset form
      document.getElementById('new-goal-name').value = '';
      document.getElementById('new-goal-progress').value = 0;
      document.getElementById('new-goal-progress-display').textContent = '0%';
      await loadAndRender();
    } else {
      showToast('❌ ' + (res.message || '新增失敗'), true);
    }
  } catch (e) {
    showToast('❌ 網路錯誤：' + e.message, true);
  } finally {
    btn.disabled = false; btn.textContent = '新增 Goal';
  }
}

// ===================================================
//  Add Action Modal
// ===================================================
function openAddActionModal(goalId, goalName) {
  addingToGoalId = goalId;
  document.getElementById('add-action-goal-name').textContent = goalName;
  document.getElementById('new-action-strategy').value = '';
  document.getElementById('new-action-name').value     = '';
  document.getElementById('new-action-assignee').value = '';
  document.getElementById('new-action-due').value      = '';
  document.getElementById('new-action-progress').value = 0;
  document.getElementById('new-action-progress-display').textContent = '0%';
  document.getElementById('new-action-status').value   = '未開始';
  openOverlay('modal-add-action');
}
function closeAddActionModal() { closeOverlay('modal-add-action'); addingToGoalId = null; }

async function saveNewAction() {
  const strategy = document.getElementById('new-action-strategy').value.trim();
  const name     = document.getElementById('new-action-name').value.trim();
  if (!strategy || !name) { showToast('❌ 請填寫策略名稱與行動項目', true); return; }

  const btn = document.getElementById('add-action-save-btn');
  btn.disabled = true; btn.textContent = '新增中…';

  const goal = state.goals.find(g => g.id === addingToGoalId);
  const obj  = state.objectives[0] || { id: '1', title: '' };
  const newActId = 'A' + (state.actions.length + 1);

  const payload = {
    type:          'add_action',
    obj_id:        obj.id,
    obj_title:     obj.title,
    goal_id:       addingToGoalId,
    goal_name:     goal ? goal.name : '',
    goal_progress: goal ? goal.progress : 0,
    goal_color:    goal ? goal.color : 'blue',
    action_id:     newActId,
    strategy_name: strategy,
    action_name:   name,
    assignee:      document.getElementById('new-action-assignee').value.trim(),
    due_date:      document.getElementById('new-action-due').value,
    progress:      Number(document.getElementById('new-action-progress').value),
    status:        document.getElementById('new-action-status').value,
  };

  try {
    const res = await postData(payload);
    if (res.success) {
      showToast('✅ 新增行動成功');
      closeAddActionModal();
      await loadAndRender();
    } else {
      showToast('❌ ' + (res.message || '新增失敗'), true);
    }
  } catch (e) {
    showToast('❌ 網路錯誤：' + e.message, true);
  } finally {
    btn.disabled = false; btn.textContent = '新增行動';
  }
}

// ===================================================
//  Filter Modal (stub)
// ===================================================
function openFilterModal() { showToast('篩選功能開發中…'); }

// ===================================================
//  Overlay helpers
// ===================================================
function openOverlay(id)  { document.getElementById(id).classList.add('open'); }
function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.modal-overlay.open').forEach(el => el.classList.remove('open'));
});

// ===================================================
//  Toast
// ===================================================
let toastTimer = null;
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'toast' + (isError ? ' error' : '');
  requestAnimationFrame(() => t.classList.add('show'));
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ===================================================
//  Main
// ===================================================
async function loadAndRender() {
  try {
    const data = await fetchData();
    state = data;
    renderBanner(data.objectives, data.goals);
    renderBoard(data.goals, data.actions);
  } catch (e) {
    document.getElementById('main-content').innerHTML = `
      <div class="empty-board" style="color:#B91C1C;">
        ⚠️ 資料載入失敗：${escHtml(e.message)}<br>
        <small>請確認 GAS_URL 已正確設定並已部署。</small>
      </div>`;
  }
}

// ===================================================
//  Utilities
// ===================================================
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function groupBy(arr, key) {
  return arr.reduce((acc, item) => {
    const k = item[key] || '（未分類）';
    if (!acc[k]) acc[k] = [];
    acc[k].push(item);
    return acc;
  }, {});
}

loadAndRender();
</script>
