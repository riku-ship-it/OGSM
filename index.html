<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OGSM 策略看板</title>
<style>
/* ===================== Reset & Base ===================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --teal:   #1D9E75;
  --blue:   #378ADD;
  --amber:  #BA7517;
  --coral:  #D85A30;
  --purple: #534AB7;
  --bg:     #F4F5F7;
  --surface:#FFFFFF;
  --border: #E2E5EA;
  --text:   #1A1D23;
  --muted:  #6B7280;
  --radius: 12px;
  --shadow: 0 1px 4px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.05);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC',
               'Noto Sans TC', 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ===================== Top Bar ===================== */
.topbar {
  background: #1A1D23;
  color: #fff;
  padding: 14px 32px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 200;
}
.topbar-title { font-size: 16px; font-weight: 700; letter-spacing: -.2px; flex: 1; }
.topbar-meta  { font-size: 12px; color: rgba(255,255,255,.5); }

.btn-add-goal {
  display: flex; align-items: center; gap: 6px;
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: background .15s;
  flex-shrink: 0;
}
.btn-add-goal:hover { background: #2563EB; }

.btn-filter {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,.12);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: background .15s;
}
.btn-filter:hover { background: rgba(255,255,255,.2); }

/* ===================== Objective Banner ===================== */
.obj-banner {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 20px 32px;
  display: flex;
  align-items: center;
  gap: 20px;
}
.obj-tag {
  background: #EEF0FF;
  color: var(--purple);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .5px;
  padding: 4px 10px;
  border-radius: 6px;
  flex-shrink: 0;
}
.obj-title { font-size: 18px; font-weight: 700; flex: 1; }
.editable-field {
  cursor: text;
  border-radius: 4px;
  padding: 2px 6px;
  margin: -2px -6px;
  transition: background .15s;
  outline: none;
}
.editable-field:hover { background: rgba(99,91,255,.07); }
.editable-field:focus { background: rgba(99,91,255,.12); box-shadow: 0 0 0 2px rgba(99,91,255,.25); }
.obj-ring-wrap { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.obj-ring-label { font-size: 13px; color: var(--muted); }
.ring-svg { transform: rotate(-90deg); }
.ring-bg   { fill: none; stroke: var(--border); stroke-width: 4; }
.ring-fill { fill: none; stroke: var(--purple); stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset .5s ease; }
.ring-pct  {
  font-size: 12px; font-weight: 700; fill: var(--purple);
  dominant-baseline: middle; text-anchor: middle;
  transform: rotate(90deg);
}

/* ===================== Main Layout (horizontal kanban) ===================== */
.board-scroll {
  padding: 24px 28px 56px;
  overflow-x: auto;
}
.board-columns {
  display: flex;
  gap: 18px;
  align-items: flex-start;
  min-width: max-content;
}

/* ===================== Goal Column ===================== */
.goal-col {
  width: 360px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* Goal header card */
.goal-header-card {
  border-radius: var(--radius);
  padding: 14px 16px 0;
  background: color-mix(in srgb, var(--goal-color, var(--blue)) 12%, #fff);
}
.goal-num {
  font-size: 12px;
  font-weight: 700;
  color: var(--goal-color, var(--blue));
  margin-bottom: 2px;
}
.goal-title-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 12px;
}
.goal-name {
  font-size: 18px;
  font-weight: 800;
  color: var(--text);
  line-height: 1.25;
  flex: 1;
}
.goal-pct {
  font-size: 20px;
  font-weight: 800;
  color: var(--goal-color, var(--blue));
  flex-shrink: 0;
}
.goal-bar-wrap {
  height: 4px;
  background: color-mix(in srgb, var(--goal-color, var(--blue)) 20%, #fff);
  border-radius: 99px;
  overflow: hidden;
  margin-bottom: 0;
}
.goal-bar-fill {
  height: 100%;
  border-radius: 99px;
  background: var(--goal-color, var(--blue));
  transition: width .4s ease;
}

/* ===================== Strategy Card ===================== */
.strategy-card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.strategy-card-header {
  padding: 12px 14px 8px;
}
.strategy-label-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
}
.strategy-num {
  font-size: 11px;
  font-weight: 700;
  color: var(--goal-color, var(--blue));
}
.strategy-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.4;
}

/* ===================== Action Row ===================== */
.action-item {
  padding: 11px 14px;
  border-top: 1px solid var(--border);
  cursor: pointer;
  transition: background .15s;
}
.action-item:hover { background: #F9FAFB; }

.action-top-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 7px;
}
.action-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.4;
  flex: 1;
}
.action-bottom-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.assignee-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--goal-color, var(--blue));
  font-weight: 700;
  flex-shrink: 0;
}
.avatar {
  width: 18px; height: 18px;
  border-radius: 50%;
  font-size: 8px;
  font-weight: 700;
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.due-date-txt {
  font-size: 11px;
  color: var(--muted);
  flex-shrink: 0;
}
.mini-bar-wrap {
  flex: 1;
  height: 3px;
  background: var(--border);
  border-radius: 99px;
  overflow: hidden;
}
.mini-bar-fill {
  height: 100%;
  border-radius: 99px;
  background: var(--goal-color, var(--blue));
  transition: width .4s ease;
}

/* ===================== Status Badge ===================== */
.badge {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 99px;
  white-space: nowrap;
  flex-shrink: 0;
}
.badge-未開始 { background: #F1F3F5; color: #6B7280; }
.badge-進行中 { background: #DBEAFE; color: #1D4ED8; }
.badge-完成   { background: #D1FAE5; color: #065F46; }
.badge-卡關   { background: #FEE2E2; color: #B91C1C; }

.btn-add-action {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  width: 100%;
  font-size: 12px;
  font-weight: 600;
  color: var(--goal-color, var(--blue));
  background: none;
  border: 1.5px dashed color-mix(in srgb, var(--goal-color, var(--blue)) 35%, transparent);
  border-radius: var(--radius);
  padding: 10px;
  cursor: pointer;
  font-family: inherit;
  transition: background .15s, border-color .15s;
}
.btn-add-action:hover {
  background: color-mix(in srgb, var(--goal-color, var(--blue)) 6%, transparent);
  border-color: var(--goal-color, var(--blue));
}
.btn-add-sub-action {
  display: block;
  width: 100%;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  background: none;
  border: none;
  border-top: 1px solid var(--border);
  padding: 8px 14px;
  cursor: pointer;
  font-family: inherit;
  text-align: left;
  transition: background .15s, color .15s;
}
.btn-add-sub-action:hover {
  background: color-mix(in srgb, var(--goal-color, var(--blue)) 6%, transparent);
  color: var(--goal-color, var(--blue));
}

/* ===================== Empty ===================== */
.empty-board {
  text-align: center;
  padding: 64px 24px;
  color: var(--muted);
  font-size: 14px;
}
.empty-board p { margin-top: 8px; font-size: 13px; }

/* ===================== Loading ===================== */
.loading-screen {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 40vh; gap: 12px; color: var(--muted);
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===================== Modal (edit action) ===================== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.4);
  z-index: 500;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }

.modal {
  background: var(--surface);
  border-radius: 14px;
  width: 100%; max-width: 480px;
  box-shadow: 0 8px 40px rgba(0,0,0,.2);
  transform: translateY(12px);
  transition: transform .2s;
  overflow: hidden;
}
.modal-overlay.open .modal { transform: translateY(0); }

.modal-header {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
}
.modal-title { font-size: 15px; font-weight: 700; line-height: 1.4; }
.modal-sub   { font-size: 12px; color: var(--muted); margin-top: 2px; }
.modal-close {
  background: none; border: none; cursor: pointer;
  color: var(--muted); font-size: 20px; line-height: 1;
  padding: 2px 4px; border-radius: 4px;
  transition: background .15s; flex-shrink: 0;
}
.modal-close:hover { background: var(--border); }

.modal-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--muted); }
.form-input, .form-select {
  width: 100%; padding: 9px 12px;
  border: 1.5px solid var(--border);
  border-radius: 7px;
  font-size: 14px; font-family: inherit;
  color: var(--text); background: var(--surface);
  transition: border-color .15s; outline: none;
}
.form-input:focus, .form-select:focus { border-color: var(--blue); }
.progress-row { display: flex; align-items: center; gap: 10px; }
.progress-row input[type=range] { flex: 1; accent-color: var(--blue); }
.pct-display { font-size: 14px; font-weight: 700; min-width: 36px; text-align: right; }

.modal-footer {
  padding: 12px 20px 18px;
  display: flex; gap: 10px; justify-content: flex-end;
}
.btn { padding: 9px 20px; border-radius: 7px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: opacity .15s, background .15s; font-family: inherit; }
.btn:disabled { opacity: .5; cursor: not-allowed; }
.btn-cancel { background: var(--border); color: var(--text); }
.btn-cancel:hover:not(:disabled) { background: #D1D5DB; }
.btn-save   { background: var(--blue); color: #fff; }
.btn-save:hover:not(:disabled)   { background: #2563EB; }

/* ===================== Add Goal Modal ===================== */
.modal-add-goal .modal { max-width: 500px; }

/* ===================== Toast ===================== */
.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(10px);
  background: #1A1D23; color: #fff;
  padding: 10px 20px; border-radius: 99px;
  font-size: 13px; font-weight: 500;
  opacity: 0; pointer-events: none;
  transition: opacity .25s, transform .25s; z-index: 600; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error { background: #B91C1C; }

/* Responsive */
@media (max-width: 640px) {
  .topbar, .obj-banner { padding-left: 16px; padding-right: 16px; }
  .board-scroll { padding-left: 16px; padding-right: 16px; }
  .goal-col { width: 300px; }
}
</style>
</head>

        <div class="modal-title" id="edit-modal-title"></div>

<script>
// ===================================================
//  COLOR MAP
// ===================================================
const COLOR_MAP = {
  teal:   '#1D9E75',
  blue:   '#378ADD',
  amber:  '#BA7517',
  coral:  '#D85A30',
  purple: '#534AB7',
};

const AVATAR_COLORS = ['#378ADD','#1D9E75','#BA7517','#D85A30','#534AB7','#0F766E','#7C3AED'];
const avatarColorCache = {};
function avatarColor(name) {
  if (!avatarColorCache[name]) {
    const idx = Object.keys(avatarColorCache).length % AVATAR_COLORS.length;
    avatarColorCache[name] = AVATAR_COLORS[idx];
  }
  return avatarColorCache[name];
}
function initials(name) {
  return name ? name.slice(0, 2) : '—';
}

// ===================================================
//  State
// ===================================================
let state = { objectives: [], goals: [], actions: [] };
let editingActionId   = null;
let addingToGoalId    = null;

// ===================================================
//  Fetch / Post
// ===================================================
async function fetchData() {
  const res  = await fetch(GAS_URL, { method: 'GET' });
  return await res.json();
}

async function postData(payload) {
  const res = await fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify(payload),
  });
  return await res.json();
}

// ===================================================
//  Render Objective Banner
// ===================================================
function renderBanner(objectives, goals) {
  const obj = objectives[0] || { title: '（尚無目標）' };
  const avg = goals.length
    ? Math.round(goals.reduce((s, g) => s + (g.progress || 0), 0) / goals.length)
    : 0;

  const titleEl = document.getElementById('obj-title-text');
  titleEl.textContent = obj.title;
  document.getElementById('obj-banner').style.display = 'flex';

  titleEl.onblur = async function() {
    const newTitle = titleEl.textContent.trim();
    if (!newTitle) { titleEl.textContent = obj.title; return; }
    if (newTitle === obj.title) return;
    try {
      const res = await postData({ type: 'rename_objective', obj_id: obj.id, new_title: newTitle });
      if (res.success) {
        obj.title = newTitle;
        state.objectives[0] = obj;
        showToast('✅ 目的已更新');
      } else {
        showToast('❌ ' + (res.message || '更新失敗'), true);
        titleEl.textContent = obj.title;
      }
    } catch(e) {
      showToast('❌ 網路錯誤：' + e.message, true);
      titleEl.textContent = obj.title;
    }
  };
  titleEl.onkeydown = function(e) {
    if (e.key === 'Enter') { e.preventDefault(); titleEl.blur(); }
    if (e.key === 'Escape') { titleEl.textContent = obj.title; titleEl.blur(); }
  };

  // top bar meta
  const year = new Date().getFullYear();
  document.getElementById('topbar-meta').textContent =
    `${year} 年度・${goals.length} 個 Goal・${state.actions.length} 項行動`;

  // overall pct text only
  document.getElementById('ring-pct').textContent = avg + '%';
}

// ===================================================
//  Render Board
// ===================================================
function renderBoard(goals, actions) {
  const board = document.getElementById('main-content');
  board.innerHTML = '';

  if (!goals.length) {
    board.innerHTML = `
      <div class="empty-board">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#D1D5DB" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M12 8v8M8 12h8"/></svg>
        <p>尚無支線資料，請點選右上角「+ 新增 Goal」開始。</p>
      </div>`;
    return;
  }

  goals.forEach((goal, idx) => {
    const color = COLOR_MAP[goal.color] || COLOR_MAP.blue;
    const goalActions = actions.filter(a => a.goal_id === goal.id);
    const groups = groupBy(goalActions, 'strategy_name');

    const col = document.createElement('div');
    col.className = 'goal-col';
    col.style.setProperty('--goal-color', color);

    // ---- Goal header card ----
    col.innerHTML = `
      <div class="goal-header-card" style="background:color-mix(in srgb,${color} 12%,#fff)">
        <div class="goal-num">Goal ${idx + 1}</div>
        <div class="goal-title-row">
          <span class="goal-name editable-field" contenteditable="true" spellcheck="false" title="點擊編輯 Goal 名稱">${escHtml(goal.name)}</span>
          <span class="goal-pct" style="color:${color}">${goal.progress}%</span>
        </div>
        <div class="goal-bar-wrap">
          <div class="goal-bar-fill" style="width:${goal.progress}%;background:${color}"></div>
        </div>
      </div>
    `;

    // Wire up inline editing for goal name
    const goalNameEl = col.querySelector('.goal-name');
    const originalName = goal.name;
    goalNameEl.onblur = async function() {
      const newName = goalNameEl.textContent.trim();
      if (!newName) { goalNameEl.textContent = goal.name; return; }
      if (newName === goal.name) return;
      try {
        const res = await postData({ type: 'rename_goal', goal_id: goal.id, new_name: newName });
        if (res.success) {
          goal.name = newName;
          showToast('✅ Goal 名稱已更新');
        } else {
          showToast('❌ ' + (res.message || '更新失敗'), true);
          goalNameEl.textContent = goal.name;
        }
      } catch(e) {
        showToast('❌ 網路錯誤：' + e.message, true);
        goalNameEl.textContent = goal.name;
      }
    };
    goalNameEl.onkeydown = function(e) {
      if (e.key === 'Enter') { e.preventDefault(); goalNameEl.blur(); }
      if (e.key === 'Escape') { goalNameEl.textContent = goal.name; goalNameEl.blur(); }
    };
    // Prevent goal card click from interfering with editing
    goalNameEl.onclick = function(e) { e.stopPropagation(); };

    // ---- Strategy cards ----
    if (!goalActions.length) {
      const empty = document.createElement('div');
      empty.style.cssText = 'font-size:13px;color:var(--muted);padding:8px 4px;';
      empty.textContent = '此 Goal 尚無行動項目';
      col.appendChild(empty);
    } else {
      Object.entries(groups).forEach(([stratName, acts], sIdx) => {
        const card = document.createElement('div');
        card.className = 'strategy-card';
        card.style.setProperty('--goal-color', color);

        const actionItems = acts.map(a => {
          const statusClass = `badge-${a.status}`;
          // choose bar color based on status
          const barColor = a.status === '卡關' ? '#EF4444'
                         : a.status === '完成' ? '#1D9E75'
                         : color;
          return `
            <div class="action-item" onclick="openEditModal('${escHtml(a.id)}')">
              <div class="action-top-row">
                <span class="action-name">${escHtml(a.action_name)}</span>
                <span class="badge ${statusClass}">${escHtml(a.status)}</span>
              </div>
              <div class="action-bottom-row">
                ${a.assignee ? `<span class="assignee-chip" style="color:${color}">
                  <span class="avatar" style="background:${avatarColor(a.assignee)}">${initials(a.assignee)}</span>
                  ${escHtml(a.assignee)}
                </span>` : ''}
                ${a.due_date ? `<span class="due-date-txt">${fmtDate(a.due_date)}</span>` : ''}
                <div class="mini-bar-wrap" style="flex:1">
                  <div class="mini-bar-fill" style="width:${a.progress}%;background:${barColor}"></div>
                </div>
              </div>
            </div>
          `;
        }).join('');

        card.innerHTML = `
          <div class="strategy-card-header">
            <div class="strategy-label-row">
              <span class="strategy-num">S${sIdx + 1}</span>
              <span class="strategy-name">${escHtml(stratName)}</span>
            </div>
          </div>
          ${actionItems}
        `;
        const subAddBtn = document.createElement('button');
        subAddBtn.className = 'btn-add-sub-action';
        subAddBtn.textContent = '+ 新增行動項目';
        subAddBtn.onclick = () => openAddActionModal(goal.id, goal.name, stratName);
        card.appendChild(subAddBtn);
        col.appendChild(card);
      });
    }

    // ---- Add action button ----
    const addBtn = document.createElement('button');
    addBtn.className = 'btn-add-action';
    addBtn.style.setProperty('--goal-color', color);
    addBtn.innerHTML = `<svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2a1 1 0 011 1v4h4a1 1 0 010 2H9v4a1 1 0 01-2 0V9H3a1 1 0 010-2h4V3a1 1 0 011-1z"/></svg> 新增行動項目`;
    addBtn.onclick = () => openAddActionModal(goal.id, goal.name);
    col.appendChild(addBtn);

    board.appendChild(col);
  });
}

// ===================================================
//  Edit Action Modal
// ===================================================
function openEditModal(actionId) {
  const a = state.actions.find(x => x.id === actionId);
  if (!a) return;
  editingActionId = actionId;

  document.getElementById('edit-modal-title').textContent = a.action_name;
  document.getElementById('edit-modal-sub').textContent   = a.strategy_name;
  document.getElementById('edit-progress').value          = a.progress;
  document.getElementById('edit-progress-display').textContent = a.progress + '%';
  document.getElementById('edit-status').value            = a.status;
  document.getElementById('edit-assignee').value          = a.assignee || '';
  document.getElementById('edit-due-date').value          = a.due_date || '';
  document.getElementById('edit-action-name').value       = a.action_name || '';

  openOverlay('modal-edit');
}
function closeEditModal() { closeOverlay('modal-edit'); editingActionId = null; }

async function saveEditModal() {
  if (!editingActionId) return;
  const btn = document.getElementById('edit-save-btn');
  btn.disabled = true; btn.textContent = '儲存中…';

  const payload = {
    type:        'update_action',
    id:          editingActionId,
    progress:    Number(document.getElementById('edit-progress').value),
    status:      document.getElementById('edit-status').value,
    assignee:    document.getElementById('edit-assignee').value.trim(),
    due_date:    document.getElementById('edit-due-date').value,
    action_name: document.getElementById('edit-action-name').value.trim(),
  };

  try {
    const res = await postData(payload);
    if (res.success) {
      showToast('✅ 更新成功');
      closeEditModal();
      await loadAndRender();
    } else {
      showToast('❌ ' + (res.message || '更新失敗'), true);
    }
  } catch (e) {
    showToast('❌ 網路錯誤：' + e.message, true);
  } finally {
    btn.disabled = false; btn.textContent = '儲存更新';
  }
}

// ===================================================
//  Add Goal Modal
// ===================================================
function openAddGoalModal() { openOverlay('modal-add-goal'); }
function closeAddGoalModal() { closeOverlay('modal-add-goal'); }

async function saveNewGoal() {
  const name     = document.getElementById('new-goal-name').value.trim();
  const color    = document.getElementById('new-goal-color').value;
  const progress = Number(document.getElementById('new-goal-progress').value);
  if (!name) { showToast('❌ 請填寫支線名稱', true); return; }

  const btn = document.getElementById('add-goal-save-btn');
  btn.disabled = true; btn.textContent = '新增中…';

  // Build new IDs based on existing data
  const obj = state.objectives[0] || { id: '1' };
  const newGoalId = 'G' + (state.goals.length + 1);
  const newActId  = 'A' + (state.actions.length + 1);

  const payload = {
    type:        'add_goal',
    obj_id:      obj.id,
    obj_title:   obj.title,
    goal_id:     newGoalId,
    goal_name:   name,
    goal_progress: progress,
    goal_color:  color,
    action_id:   newActId,   // placeholder row required by sheet structure
  };

  try {
    const res = await postData(payload);
    if (res.success) {
      showToast('✅ 新增成功');
      closeAddGoalModal();
      // reset form
      document.getElementById('new-goal-name').value = '';
      document.getElementById('new-goal-progress').value = 0;
      document.getElementById('new-goal-progress-display').textContent = '0%';
      await loadAndRender();
    } else {
      showToast('❌ ' + (res.message || '新增失敗'), true);
    }
  } catch (e) {
    showToast('❌ 網路錯誤：' + e.message, true);
  } finally {
    btn.disabled = false; btn.textContent = '新增 Goal';
  }
}

// ===================================================
//  Add Action Modal
// ===================================================
function openAddActionModal(goalId, goalName, strategyName = '') {
  addingToGoalId = goalId;
  document.getElementById('add-action-goal-name').textContent = goalName;
  document.getElementById('new-action-strategy').value = strategyName;
  document.getElementById('new-action-name').value     = '';
  document.getElementById('new-action-assignee').value = '';
  document.getElementById('new-action-due').value      = '';
  document.getElementById('new-action-progress').value = 0;
  document.getElementById('new-action-progress-display').textContent = '0%';
  document.getElementById('new-action-status').value   = '未開始';
  openOverlay('modal-add-action');
}
function closeAddActionModal() { closeOverlay('modal-add-action'); addingToGoalId = null; }

async function saveNewAction() {
  const strategy = document.getElementById('new-action-strategy').value.trim();
  const name     = document.getElementById('new-action-name').value.trim();
  if (!strategy || !name) { showToast('❌ 請填寫策略名稱與行動項目', true); return; }

  const btn = document.getElementById('add-action-save-btn');
  btn.disabled = true; btn.textContent = '新增中…';

  const goal = state.goals.find(g => g.id === addingToGoalId);
  const obj  = state.objectives[0] || { id: '1', title: '' };
  const newActId = 'A' + (state.actions.length + 1);

  const payload = {
    type:          'add_action',
    obj_id:        obj.id,
    obj_title:     obj.title,
    goal_id:       addingToGoalId,
    goal_name:     goal ? goal.name : '',
    goal_progress: goal ? goal.progress : 0,
    goal_color:    goal ? goal.color : 'blue',
    action_id:     newActId,
    strategy_name: strategy,
    action_name:   name,
    assignee:      document.getElementById('new-action-assignee').value.trim(),
    due_date:      document.getElementById('new-action-due').value,
    progress:      Number(document.getElementById('new-action-progress').value),
    status:        document.getElementById('new-action-status').value,
  };

  try {
    const res = await postData(payload);
    if (res.success) {
      showToast('✅ 新增行動成功');
      closeAddActionModal();
      await loadAndRender();
    } else {
      showToast('❌ ' + (res.message || '新增失敗'), true);
    }
  } catch (e) {
    showToast('❌ 網路錯誤：' + e.message, true);
  } finally {
    btn.disabled = false; btn.textContent = '新增行動';
  }
}

// ===================================================
//  Filter Modal (stub)
// ===================================================
function openFilterModal() { showToast('篩選功能開發中…'); }

// ===================================================
//  Overlay helpers
// ===================================================
function openOverlay(id)  { document.getElementById(id).classList.add('open'); }
function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.modal-overlay.open').forEach(el => el.classList.remove('open'));
});

// ===================================================
//  Toast
// ===================================================
let toastTimer = null;
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'toast' + (isError ? ' error' : '');
  requestAnimationFrame(() => t.classList.add('show'));
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ===================================================
//  Main
// ===================================================
async function loadAndRender() {
  try {
    const data = await fetchData();
    state = data;
    renderBanner(data.objectives, data.goals);
    renderBoard(data.goals, data.actions);
  } catch (e) {
    document.getElementById('main-content').innerHTML = `
      <div class="empty-board" style="color:#B91C1C;">
        ⚠️ 資料載入失敗：${escHtml(e.message)}<br>
        <small>請確認 GAS_URL 已正確設定並已部署。</small>
      </div>`;
  }
}

// ===================================================
//  Utilities
// ===================================================
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(s) {
  if (!s) return '';
  const m = s.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (m) return parseInt(m[2]) + '/' + parseInt(m[3]);
  const d = new Date(s);
  if (!isNaN(d)) return (d.getMonth() + 1) + '/' + d.getDate();
  return '';
}
function groupBy(arr, key) {
  return arr.reduce((acc, item) => {
    const k = item[key] || '（未分類）';
    if (!acc[k]) acc[k] = [];
    acc[k].push(item);
    return acc;
  }, {});
}

loadAndRender();
</script>
