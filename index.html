<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OGSM 策略看板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <span class="topbar-logo">OGSM</span>
  <div class="topbar-sep"></div>
  <div class="topbar-staff-list" id="topbar-staff-list"></div>
  <button class="topbar-btn topbar-btn-chat" id="chat-toggle-btn" onclick="toggleChat()">
    <svg width="13" height="13" viewBox="0 0 20 20" fill="currentColor"><path d="M2 5a2 2 0 012-2h12a2 2 0 012 2v7a2 2 0 01-2 2H6l-4 4V5z"/></svg>
    AI 助手
  </button>
  <button class="topbar-btn topbar-btn-primary" onclick="openAddStaffModal()">
    <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2a1 1 0 011 1v4h4a1 1 0 010 2H9v4a1 1 0 01-2 0V9H3a1 1 0 010-2h4V3a1 1 0 011-1z"/></svg>
    新增職員
  </button>
</div>

<div class="app-body">
<div class="main-content-wrap">

<!-- Tab Bar -->
<div class="main-tabs">
  <button class="main-tab active" id="tab-btn-ogsm" onclick="switchTab('ogsm')">OGSM</button>
  <button class="main-tab" id="tab-btn-stats" onclick="switchTab('stats')">New統計</button>
</div>

<!-- OGSM Tab Content -->
<div id="tab-content-ogsm">

<!-- Objective -->
<div class="obj-section" id="obj-section" style="display:none">
  <div class="obj-eyebrow">
    <span class="col-tag col-tag-o">O</span>
    <span class="col-title">目的</span>
  </div>
  <div class="obj-name" id="obj-name" contenteditable="true" spellcheck="false"></div>
</div>

<!-- Three Columns -->
<div class="three-col-wrap" id="three-col-wrap">
  <div class="loading-overlay" style="grid-column:1/-1"><div class="spinner"></div><span>載入中</span></div>
</div>

</div><!-- /tab-content-ogsm -->

<!-- Stats Tab Content -->
<div id="tab-content-stats" style="display:none"></div>

</div><!-- /main-content-wrap -->

<!-- ── Chat Panel ── -->
<div class="chat-panel" id="chat-panel">
  <div class="chat-panel-inner">
    <div class="chat-panel-header">
      <div class="chat-panel-icon">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="#fff"><path d="M2 5a2 2 0 012-2h12a2 2 0 012 2v7a2 2 0 01-2 2H6l-4 4V5z"/></svg>
      </div>
      <span class="chat-panel-title">AI 對話助手</span>
      <button class="chat-close-btn" onclick="toggleChat()">✕</button>
    </div>
    <div class="chat-messages" id="chat-messages">
      <div class="chat-bubble ai">嗨！我是你的 OGSM 策略助手。你可以問我關於目標、策略或行動項目的問題，我會盡力協助你分析與優化。</div>
    </div>
    <div class="chat-input-wrap">
      <textarea class="chat-input" id="chat-input" placeholder="輸入訊息… (Enter 送出，Shift+Enter 換行)" rows="1"></textarea>
      <button class="chat-send-btn" onclick="sendChatMessage()">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/></svg>
      </button>
    </div>
  </div>
</div>

</div><!-- /app-body -->

<!-- ── Edit Action Modal ── -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="edit-modal-title"></div>
        <div class="modal-sub" id="edit-modal-sub"></div>
      </div>
      <button class="modal-close" onclick="closeEditModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">行動項目名稱</label>
        <input type="text" class="form-input" id="edit-action-name" />
      </div>
      <div class="form-group">
        <label class="form-label">策略</label>
        <select class="form-select" id="edit-action-strategy"></select>
      </div>
      <div class="form-group">
        <label class="form-label">進度（%）</label>
        <div class="progress-row">
          <input type="range" id="edit-progress" min="0" max="100" step="1" oninput="document.getElementById('edit-progress-display').textContent=this.value+'%'"/>
          <span class="pct-display" id="edit-progress-display">0%</span>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">狀態</label>
        <select class="form-select" id="edit-status">
          <option value="未開始">未開始</option>
          <option value="進行中">進行中</option>
          <option value="完成">完成</option>
          <option value="卡關">卡關</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">負責人</label>
        <input type="text" class="form-input" id="edit-assignee" placeholder="請輸入姓名" />
      </div>
      <div class="form-group">
        <label class="form-label">截止日期</label>
        <input type="date" class="form-input" id="edit-due-date" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeEditModal()">取消</button>
      <button class="btn btn-save" id="edit-save-btn" onclick="saveEditModal()">儲存更新</button>
    </div>
  </div>
</div>

<!-- ── Add Goal Modal ── -->
<div class="modal-overlay" id="modal-add-goal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title">新增支線目標</div>
        <div class="modal-sub">新增後將寫入 Google Sheets</div>
      </div>
      <button class="modal-close" onclick="closeAddGoalModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">支線名稱 <span style="color:#f5876e">*</span></label>
        <input type="text" class="form-input" id="new-goal-name" placeholder="例：數位行銷強化" />
      </div>
      <div class="form-group">
        <label class="form-label">顏色</label>
        <select class="form-select" id="new-goal-color">
          <option value="teal">🟢 翠綠</option>
          <option value="blue" selected>🔵 藍色</option>
          <option value="amber">🟡 琥珀</option>
          <option value="coral">🟠 珊瑚</option>
          <option value="purple">🟣 紫色</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">截止日期</label>
        <input type="date" class="form-input" id="new-goal-due" />
      </div>
      <div class="form-group">
        <label class="form-label">初始進度（%）</label>
        <div class="progress-row">
          <input type="range" id="new-goal-progress" min="0" max="100" step="1" value="0" oninput="document.getElementById('new-goal-progress-display').textContent=this.value+'%'"/>
          <span class="pct-display" id="new-goal-progress-display">0%</span>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeAddGoalModal()">取消</button>
      <button class="btn btn-save" id="add-goal-save-btn" onclick="saveNewGoal()">新增目標</button>
    </div>
  </div>
</div>

<!-- ── Add Action Modal ── -->
<div class="modal-overlay" id="modal-add-action">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title">新增行動項目</div>
        <div class="modal-sub" id="add-action-goal-name"></div>
      </div>
      <button class="modal-close" onclick="closeAddActionModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">策略名稱 <span style="color:#f5876e">*</span></label>
        <input type="text" class="form-input" id="new-action-strategy" placeholder="例：建立內容行銷飛輪" />
      </div>
      <div class="form-group">
        <label class="form-label">行動項目 <span style="color:#f5876e">*</span></label>
        <input type="text" class="form-input" id="new-action-name" placeholder="例：建立文章選題資料庫" />
      </div>
      <div class="form-group">
        <label class="form-label">負責人</label>
        <input type="text" class="form-input" id="new-action-assignee" placeholder="請輸入姓名" />
      </div>
      <div class="form-group">
        <label class="form-label">截止日期</label>
        <input type="date" class="form-input" id="new-action-due" />
      </div>
      <div class="form-group">
        <label class="form-label">初始進度（%）</label>
        <div class="progress-row">
          <input type="range" id="new-action-progress" min="0" max="100" step="1" value="0" oninput="document.getElementById('new-action-progress-display').textContent=this.value+'%'"/>
          <span class="pct-display" id="new-action-progress-display">0%</span>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">狀態</label>
        <select class="form-select" id="new-action-status">
          <option value="未開始">未開始</option>
          <option value="進行中">進行中</option>
          <option value="完成">完成</option>
          <option value="卡關">卡關</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeAddActionModal()">取消</button>
      <button class="btn btn-save" id="add-action-save-btn" onclick="saveNewAction()">新增行動</button>
    </div>
  </div>
</div>

<!-- ── Add Strategy Modal ── -->
<div class="modal-overlay" id="modal-add-strategy">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title">新增策略</div>
        <div class="modal-sub" id="add-strategy-goal-name"></div>
      </div>
      <button class="modal-close" onclick="closeAddStrategyModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">策略名稱 <span style="color:#f5876e">*</span></label>
        <input type="text" class="form-input" id="new-strategy-name" placeholder="例：建立內容行銷飛輪" />
      </div>
      <div class="form-group">
        <label class="form-label">策略執行成功定義</label>
        <input type="text" class="form-input" id="new-strategy-success-def" placeholder="例：每月新增 10 篇高品質文章" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeAddStrategyModal()">取消</button>
      <button class="btn btn-save" id="add-strategy-save-btn" onclick="saveNewStrategy()">新增策略</button>
    </div>
  </div>
</div>

<!-- ── Traffic Light Definition Modal ── -->
<div class="modal-overlay" id="modal-traffic-def">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title">定義燈號意思</div>
        <div class="modal-sub" id="traffic-def-goal-name"></div>
      </div>
      <button class="modal-close" onclick="closeOverlay('modal-traffic-def')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label" style="color:#ef4444">🔴 紅燈意思</label>
        <input type="text" class="form-input" id="tdef-red" placeholder="例：嚴重落後，需立即介入" />
      </div>
      <div class="form-group">
        <label class="form-label" style="color:#f59e0b">🟡 黃燈意思</label>
        <input type="text" class="form-input" id="tdef-yellow" placeholder="例：有風險，需關注" />
      </div>
      <div class="form-group">
        <label class="form-label" style="color:#10b981">🟢 綠燈意思</label>
        <input type="text" class="form-input" id="tdef-green" placeholder="例：進展順利" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeOverlay('modal-traffic-def')">取消</button>
      <button class="btn btn-save" onclick="saveTrafficDefsUI()">儲存定義</button>
    </div>
  </div>
</div>

<!-- ── Confirm Delete Modal ── -->
<div class="modal-overlay" id="modal-confirm-delete">
  <div class="modal modal-sm">
    <div class="modal-header">
      <div class="modal-title">確認刪除</div>
    </div>
    <div class="modal-body">
      <p id="confirm-delete-desc" style="color:var(--text2);font-size:14px;line-height:1.6;margin:0"></p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeOverlay('modal-confirm-delete')">取消</button>
      <button class="btn btn-delete" onclick="executeDelete()">刪除</button>
    </div>
  </div>
</div>

<!-- ── Add Staff Modal ── -->
<div class="modal-overlay" id="modal-add-staff">
  <div class="modal modal-sm">
    <div class="modal-header">
      <div>
        <div class="modal-title">新增職員</div>
        <div class="modal-sub">新增後可切換至該職員的 OGSM 看板</div>
      </div>
      <button class="modal-close" onclick="closeAddStaffModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">職員名稱 <span style="color:#f5876e">*</span></label>
        <input type="text" class="form-input" id="new-staff-name" placeholder="例：Riku" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeAddStaffModal()">取消</button>
      <button class="btn btn-save" id="add-staff-save-btn" onclick="saveNewStaff()">新增職員</button>
    </div>
  </div>
</div>

<!-- ── Edit Goal Modal ── -->
<div class="modal-overlay" id="modal-edit-goal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title">編輯目標</div>
        <div class="modal-sub" id="edit-goal-modal-sub"></div>
      </div>
      <button class="modal-close" onclick="closeOverlay('modal-edit-goal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">顏色</label>
        <select class="form-select" id="edit-goal-color">
          <option value="teal">🟢 翠綠</option>
          <option value="blue">🔵 藍色</option>
          <option value="amber">🟡 琥珀</option>
          <option value="coral">🟠 珊瑚</option>
          <option value="purple">🟣 紫色</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeOverlay('modal-edit-goal')">取消</button>
      <button class="btn btn-save" id="edit-goal-save-btn" onclick="saveEditGoal()">儲存</button>
    </div>
  </div>
</div>

<!-- ── Edit Strategy Modal ── -->
<div class="modal-overlay" id="modal-edit-strategy">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title">編輯策略</div>
        <div class="modal-sub" id="edit-strategy-modal-sub"></div>
      </div>
      <button class="modal-close" onclick="closeOverlay('modal-edit-strategy')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">策略執行成功定義</label>
        <input type="text" class="form-input" id="edit-strategy-success-def" placeholder="例：每月新增 10 篇高品質文章" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeOverlay('modal-edit-strategy')">取消</button>
      <button class="btn btn-save" id="edit-strategy-save-btn" onclick="saveEditStrategy()">儲存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="script.js"></script>

</body>
</html>
