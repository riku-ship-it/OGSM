<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OGSM 策略看板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --teal:   #0D9373;
  --blue:   #2B7FE0;
  --amber:  #C47A15;
  --coral:  #D44E28;
  --purple: #5B4FCF;
  --bg:     #F0F3F9;
  --bg2:    #FFFFFF;
  --bg3:    #E8ECF3;
  --surface:#FFFFFF;
  --border: rgba(0,0,0,.09);
  --border2:rgba(0,0,0,.14);
  --text:   #1A1D26;
  --text2:  #555E6E;
  --text3:  #8E96A3;
  --radius: 14px;
  --font:   'DM Sans', sans-serif;
  --mono:   'DM Mono', monospace;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Top Bar ── */
.topbar {
  background: rgba(240,243,249,.95);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  height: 52px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 300;
}
.topbar-logo {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .5px;
  color: var(--text);
  font-family: var(--mono);
  background: linear-gradient(135deg, var(--blue) 0%, var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.topbar-sep { width: 1px; height: 18px; background: var(--border2); }
.topbar-meta { font-size: 12px; color: var(--text3); flex: 1; }

.topbar-btn {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface);
  color: var(--text2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  font-family: var(--font);
  transition: all .15s;
}
.topbar-btn:hover { background: var(--bg3); color: var(--text); border-color: rgba(0,0,0,.22); }

.topbar-btn-primary {
  background: var(--blue);
  color: #fff;
  border-color: transparent;
}
.topbar-btn-primary:hover { background: #1a6fd4; color: #fff; border-color: transparent; }

/* ── Objective Section ── */
.obj-section {
  margin: 20px 24px 0;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 22px;
  position: relative;
  overflow: hidden;
}
.obj-section::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(83,75,183,.12) 0%, transparent 60%);
  pointer-events: none;
}
.obj-eyebrow {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.obj-pill {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  color: #5B4FCF;
  background: rgba(83,75,183,.1);
  border: 1px solid rgba(83,75,183,.3);
  padding: 3px 10px;
  border-radius: 99px;
  text-transform: uppercase;
  font-family: var(--mono);
}
.obj-line { flex: 1; height: 1px; background: var(--border); }
.obj-pct-badge {
  font-size: 13px;
  font-weight: 700;
  color: #5B4FCF;
  font-family: var(--mono);
}
.obj-name {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
  outline: none;
  cursor: text;
  border-radius: 6px;
  padding: 2px 4px;
  margin: -2px -4px;
  transition: background .15s;
}
.obj-name:hover { background: rgba(0,0,0,.04); }
.obj-name:focus { background: rgba(83,75,183,.08); box-shadow: 0 0 0 2px rgba(83,75,183,.3); }

/* ── Three-column layout ── */
.three-col-wrap {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 0;
  flex: 1;
  margin: 14px 24px 24px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  min-height: 0;
}

.col-panel {
  display: flex;
  flex-direction: column;
  min-height: 500px;
  border-right: 1px solid var(--border);
}
.col-panel:last-child { border-right: none; }

.col-header {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg3);
  flex-shrink: 0;
}
.col-tag {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 3px 9px;
  border-radius: 99px;
  font-family: var(--mono);
}
.col-tag-g { background: rgba(43,127,224,.12); color: #1a6fd4; border: 1px solid rgba(43,127,224,.3); }
.col-tag-s { background: rgba(13,147,115,.12); color: #0a7a60; border: 1px solid rgba(13,147,115,.3); }
.col-tag-m { background: rgba(196,122,21,.12); color: #a06210; border: 1px solid rgba(196,122,21,.3); }

.col-title { font-size: 13px; font-weight: 600; color: var(--text2); }
.col-count { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-left: auto; }

.col-body {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.col-body::-webkit-scrollbar { width: 4px; }
.col-body::-webkit-scrollbar-track { background: transparent; }
.col-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

/* ── Goal Item ── */
.goal-item {
  padding: 13px 14px;
  border-radius: 10px;
  cursor: pointer;
  border: 1.5px solid transparent;
  background: rgba(0,0,0,.02);
  transition: all .18s;
  position: relative;
  overflow: hidden;
}
.goal-item::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--goal-color, var(--blue));
  border-radius: 99px 0 0 99px;
  opacity: 0;
  transition: opacity .18s;
}
.goal-item:hover { background: rgba(0,0,0,.04); border-color: var(--border2); }
.goal-item:hover::before { opacity: 1; }
.goal-item.active {
  background: color-mix(in srgb, var(--goal-color, var(--blue)) 12%, transparent);
  border-color: color-mix(in srgb, var(--goal-color, var(--blue)) 40%, transparent);
}
.goal-item.active::before { opacity: 1; }

.goal-item-num { font-size: 10px; font-weight: 600; color: var(--text3); font-family: var(--mono); margin-bottom: 4px; }
.goal-item-name {
  font-size: 13px; font-weight: 600; color: var(--text);
  line-height: 1.4; margin-bottom: 8px;
  outline: none; cursor: text;
  border-radius: 4px; padding: 1px 3px; margin: -1px -3px 6px;
}
.goal-item-name:hover { background: rgba(0,0,0,.04); }
.goal-item-name:focus { background: rgba(0,0,0,.06); box-shadow: 0 0 0 2px rgba(0,0,0,.1); }
.goal-item-bar { height: 3px; background: rgba(0,0,0,.1); border-radius: 99px; overflow: hidden; }
.goal-item-fill { height: 100%; border-radius: 99px; transition: width .4s ease; }
.goal-item-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
.goal-item-pct { font-size: 11px; font-weight: 700; font-family: var(--mono); }
.goal-item-arrow {
  font-size: 12px;
  color: var(--text3);
  opacity: 0;
  transition: opacity .18s, transform .18s;
}
.goal-item:hover .goal-item-arrow,
.goal-item.active .goal-item-arrow { opacity: 1; transform: translateX(2px); }

/* ── Strategy Item ── */
.strategy-item {
  padding: 12px 14px;
  border-radius: 10px;
  cursor: pointer;
  border: 1.5px solid transparent;
  background: rgba(0,0,0,.02);
  transition: all .18s;
}
.strategy-item:hover { background: rgba(0,0,0,.04); border-color: var(--border2); }
.strategy-item.active {
  background: color-mix(in srgb, var(--goal-color, var(--teal)) 12%, transparent);
  border-color: color-mix(in srgb, var(--goal-color, var(--teal)) 40%, transparent);
}
.strategy-item-num { font-size: 10px; font-weight: 600; color: var(--text3); font-family: var(--mono); margin-bottom: 4px; }
.strategy-item-name {
  font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; margin-bottom: 6px;
  outline: none; cursor: text;
  border-radius: 4px; padding: 1px 3px; margin: -1px -3px 4px;
}
.strategy-item-name:hover { background: rgba(0,0,0,.04); }
.strategy-item-name:focus { background: rgba(0,0,0,.06); box-shadow: 0 0 0 2px rgba(0,0,0,.1); }
.strategy-item-count { font-size: 11px; color: var(--text3); }
.strategy-item-arrow { font-size: 12px; color: var(--text3); opacity: 0; transition: opacity .18s; }
.strategy-item:hover .strategy-item-arrow,
.strategy-item.active .strategy-item-arrow { opacity: 1; }

/* ── Action Item ── */
.action-item {
  padding: 12px 14px;
  border-radius: 10px;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: rgba(0,0,0,.02);
  transition: all .18s;
}
.action-item:hover { background: rgba(0,0,0,.04); border-color: var(--border2); }
.action-item-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
.action-item-name {
  font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; flex: 1;
  outline: none; cursor: text;
  border-radius: 4px; padding: 1px 3px; margin: -1px -3px;
}
.action-item-name:hover { background: rgba(0,0,0,.04); }
.action-item-name:focus { background: rgba(0,0,0,.06); box-shadow: 0 0 0 2px rgba(0,0,0,.1); }
.action-badge {
  font-size: 10px; font-weight: 700; padding: 2px 8px;
  border-radius: 99px; white-space: nowrap; flex-shrink: 0;
}
.badge-未開始 { background: rgba(0,0,0,.07); color: var(--text3); }
.badge-進行中 { background: rgba(43,127,224,.12); color: #1a6fd4; }
.badge-完成   { background: rgba(13,147,115,.12); color: #0a7a60; }
.badge-卡關   { background: rgba(212,78,40,.12);  color: #b83d1e; }

.action-item-meta { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.action-meta-assignee { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text3); flex-shrink: 1; min-width: 0; overflow: hidden; white-space: nowrap; }
.avatar {
  width: 18px; height: 18px; border-radius: 50%;
  font-size: 8px; font-weight: 700; color: #fff;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.action-meta-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; width: 55%; }
.action-meta-date { font-size: 11px; color: var(--text3); font-family: var(--mono); white-space: nowrap; flex-shrink: 0; }
.action-mini-bar { flex: 1; height: 3px; background: rgba(0,0,0,.1); border-radius: 99px; overflow: hidden; }
.action-mini-fill { height: 100%; border-radius: 99px; transition: width .4s; }
.action-pct { font-size: 10px; font-weight: 700; font-family: var(--mono); color: var(--text3); flex-shrink: 0; }

/* ── Empty / Hint states ── */
.col-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 32px;
  color: var(--text3);
  font-size: 12px;
  text-align: center;
}
.col-empty-icon { font-size: 28px; opacity: .3; }
.col-hint {
  margin: 10px;
  padding: 12px;
  border: 1px dashed var(--border2);
  border-radius: 10px;
  font-size: 12px;
  color: var(--text3);
  text-align: center;
}

/* ── Add Buttons ── */
.btn-col-add {
  display: flex; align-items: center; justify-content: center; gap: 5px;
  margin: 6px 10px 10px;
  padding: 9px;
  border: 1.5px dashed var(--border2);
  border-radius: 10px;
  font-size: 12px; font-weight: 500;
  color: var(--text3);
  background: none;
  cursor: pointer;
  font-family: var(--font);
  transition: all .15s;
  flex-shrink: 0;
}
.btn-col-add:hover { border-color: rgba(0,0,0,.3); color: var(--text2); background: rgba(0,0,0,.03); }

/* ── Loading ── */
.loading-overlay {
  display: flex; align-items: center; justify-content: center;
  min-height: 200px; flex-direction: column; gap: 12px;
  color: var(--text3); font-size: 13px;
}
.spinner {
  width: 28px; height: 28px;
  border: 2.5px solid var(--border2);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.65);
  backdrop-filter: blur(8px);
  z-index: 500;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }

.modal {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 16px;
  width: 100%; max-width: 460px;
  box-shadow: 0 24px 64px rgba(0,0,0,.18);
  transform: translateY(14px) scale(.98);
  transition: transform .22s cubic-bezier(.34,1.56,.64,1);
  overflow: hidden;
}
.modal-overlay.open .modal { transform: translateY(0) scale(1); }

.modal-header {
  padding: 20px 22px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
}
.modal-title { font-size: 15px; font-weight: 700; color: var(--text); }
.modal-sub   { font-size: 12px; color: var(--text3); margin-top: 3px; }
.modal-close {
  background: rgba(0,0,0,.06); border: none; cursor: pointer;
  color: var(--text3); font-size: 16px; line-height: 1;
  width: 28px; height: 28px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s; flex-shrink: 0;
}
.modal-close:hover { background: rgba(0,0,0,.12); color: var(--text); }

.modal-body { padding: 18px 22px; display: flex; flex-direction: column; gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-label { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: .5px; text-transform: uppercase; }
.form-input, .form-select {
  width: 100%; padding: 9px 12px;
  background: var(--bg3);
  border: 1.5px solid var(--border2);
  border-radius: 8px;
  font-size: 13px; font-family: var(--font);
  color: var(--text);
  transition: border-color .15s; outline: none;
}
.form-input:focus, .form-select:focus { border-color: var(--blue); }
.form-select option { background: var(--bg2); }
.progress-row { display: flex; align-items: center; gap: 10px; }
.progress-row input[type=range] { flex: 1; accent-color: var(--blue); cursor: pointer; }
.pct-display { font-size: 13px; font-weight: 700; font-family: var(--mono); color: var(--text2); min-width: 36px; text-align: right; }

.modal-footer {
  padding: 12px 22px 20px;
  display: flex; gap: 10px; justify-content: flex-end;
}
.btn { padding: 9px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all .15s; font-family: var(--font); }
.btn:disabled { opacity: .45; cursor: not-allowed; }
.btn-cancel { background: var(--surface); color: var(--text2); border: 1px solid var(--border2); }
.btn-cancel:hover:not(:disabled) { background: var(--bg3); }
.btn-save   { background: var(--blue); color: #fff; }
.btn-save:hover:not(:disabled)   { background: #1a6fd4; }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(12px);
  background: var(--surface);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 10px 20px; border-radius: 99px;
  font-size: 13px; font-weight: 500;
  opacity: 0; pointer-events: none;
  transition: opacity .25s, transform .25s; z-index: 600; white-space: nowrap;
  box-shadow: 0 8px 24px rgba(0,0,0,.3);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error { background: #7f1d1d; border-color: #b91c1c; color: #fca5a5; }
</style>
</head>
<body>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbywtjAiFsqzEzKiQ4soH7LdRHWiViQTCrte3fL2ySS49nPb_w3Zk7ctX1dyb1A0zDmMXw/exec';
</script>

<!-- Top Bar -->
<div class="topbar">
  <span class="topbar-logo">OGSM</span>
  <div class="topbar-sep"></div>
  <span class="topbar-meta" id="topbar-meta">載入中</span>
  <button class="topbar-btn" onclick="showToast('篩選功能開發中')">
    <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M1 2h14v1.5L9 9v5l-2-1V9L1 3.5V2z"/></svg>
    篩選成員
  </button>
  <button class="topbar-btn topbar-btn-primary" onclick="openAddGoalModal()">
    <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2a1 1 0 011 1v4h4a1 1 0 010 2H9v4a1 1 0 01-2 0V9H3a1 1 0 010-2h4V3a1 1 0 011-1z"/></svg>
    新增目標
  </button>
</div>

<!-- Objective -->
<div class="obj-section" id="obj-section" style="display:none">
  <div class="obj-eyebrow">
    <span class="obj-pill">O · 目的</span>
    <div class="obj-line"></div>
    <span class="obj-pct-badge" id="obj-pct-badge">0%</span>
  </div>
  <div class="obj-name" id="obj-name" contenteditable="true" spellcheck="false"></div>
</div>

<!-- Three Columns -->
<div class="three-col-wrap" id="three-col-wrap">
  <div class="loading-overlay" style="grid-column:1/-1"><div class="spinner"></div><span>載入中</span></div>
</div>

<!-- ── Edit Action Modal ── -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="edit-modal-title"></div>
        <div class="modal-sub" id="edit-modal-sub"></div>
      </div>
      <button class="modal-close" onclick="closeEditModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">行動項目名稱</label>
        <input type="text" class="form-input" id="edit-action-name" />
      </div>
      <div class="form-group">
        <label class="form-label">進度（%）</label>
        <div class="progress-row">
          <input type="range" id="edit-progress" min="0" max="100" step="1" oninput="document.getElementById('edit-progress-display').textContent=this.value+'%'"/>
          <span class="pct-display" id="edit-progress-display">0%</span>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">狀態</label>
        <select class="form-select" id="edit-status">
          <option value="未開始">未開始</option>
          <option value="進行中">進行中</option>
          <option value="完成">完成</option>
          <option value="卡關">卡關</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">負責人</label>
        <input type="text" class="form-input" id="edit-assignee" placeholder="請輸入姓名" />
      </div>
      <div class="form-group">
        <label class="form-label">截止日期</label>
        <input type="date" class="form-input" id="edit-due-date" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeEditModal()">取消</button>
      <button class="btn btn-save" id="edit-save-btn" onclick="saveEditModal()">儲存更新</button>
    </div>
  </div>
</div>

<!-- ── Add Goal Modal ── -->
<div class="modal-overlay" id="modal-add-goal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title">新增支線目標</div>
        <div class="modal-sub">新增後將寫入 Google Sheets</div>
      </div>
      <button class="modal-close" onclick="closeAddGoalModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">支線名稱 <span style="color:#f5876e">*</span></label>
        <input type="text" class="form-input" id="new-goal-name" placeholder="例：數位行銷強化" />
      </div>
      <div class="form-group">
        <label class="form-label">顏色</label>
        <select class="form-select" id="new-goal-color">
          <option value="teal">🟢 翠綠</option>
          <option value="blue" selected>🔵 藍色</option>
          <option value="amber">🟡 琥珀</option>
          <option value="coral">🟠 珊瑚</option>
          <option value="purple">🟣 紫色</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">初始進度（%）</label>
        <div class="progress-row">
          <input type="range" id="new-goal-progress" min="0" max="100" step="1" value="0" oninput="document.getElementById('new-goal-progress-display').textContent=this.value+'%'"/>
          <span class="pct-display" id="new-goal-progress-display">0%</span>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeAddGoalModal()">取消</button>
      <button class="btn btn-save" id="add-goal-save-btn" onclick="saveNewGoal()">新增目標</button>
    </div>
  </div>
</div>

<!-- ── Add Action Modal ── -->
<div class="modal-overlay" id="modal-add-action">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title">新增行動項目</div>
        <div class="modal-sub" id="add-action-goal-name"></div>
      </div>
      <button class="modal-close" onclick="closeAddActionModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">策略名稱 <span style="color:#f5876e">*</span></label>
        <input type="text" class="form-input" id="new-action-strategy" placeholder="例：建立內容行銷飛輪" />
      </div>
      <div class="form-group">
        <label class="form-label">行動項目 <span style="color:#f5876e">*</span></label>
        <input type="text" class="form-input" id="new-action-name" placeholder="例：建立文章選題資料庫" />
      </div>
      <div class="form-group">
        <label class="form-label">負責人</label>
        <input type="text" class="form-input" id="new-action-assignee" placeholder="請輸入姓名" />
      </div>
      <div class="form-group">
        <label class="form-label">截止日期</label>
        <input type="date" class="form-input" id="new-action-due" />
      </div>
      <div class="form-group">
        <label class="form-label">初始進度（%）</label>
        <div class="progress-row">
          <input type="range" id="new-action-progress" min="0" max="100" step="1" value="0" oninput="document.getElementById('new-action-progress-display').textContent=this.value+'%'"/>
          <span class="pct-display" id="new-action-progress-display">0%</span>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">狀態</label>
        <select class="form-select" id="new-action-status">
          <option value="未開始">未開始</option>
          <option value="進行中">進行中</option>
          <option value="完成">完成</option>
          <option value="卡關">卡關</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeAddActionModal()">取消</button>
      <button class="btn btn-save" id="add-action-save-btn" onclick="saveNewAction()">新增行動</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Color Map ──
const COLOR_MAP = {
  teal:   '#0D9373',
  blue:   '#2B7FE0',
  amber:  '#C47A15',
  coral:  '#D44E28',
  purple: '#5B4FCF',
};
const AVATAR_COLORS = ['#2B7FE0','#0D9373','#C47A15','#D44E28','#5B4FCF','#0F766E','#7C3AED'];
const avatarCache = {};
function avatarColor(name) {
  if (!avatarCache[name]) {
    avatarCache[name] = AVATAR_COLORS[Object.keys(avatarCache).length % AVATAR_COLORS.length];
  }
  return avatarCache[name];
}
function initials(name) { return name ? name.slice(0,2) : '?'; }

// ── State ──
let state = { objectives: [], goals: [], actions: [] };
let selectedGoalId     = null;
let selectedStrategy   = null;
let editingActionId    = null;
let addingToGoalId     = null;

// ── Fetch / Post ──
async function fetchData() {
  const res = await fetch(GAS_URL, { method: 'GET' });
  return await res.json();
}
async function postData(payload) {
  const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
  return await res.json();
}

// ── Render ──
function render() {
  renderObjective();
  renderColumns();
}

function renderObjective() {
  const { objectives, goals } = state;
  const obj = objectives[0] || { title: '請設定目的', id: '' };
  const avg = goals.length
    ? Math.round(goals.reduce((s,g) => s + (g.progress||0), 0) / goals.length)
    : 0;

  const section = document.getElementById('obj-section');
  section.style.display = 'block';
  document.getElementById('obj-pct-badge').textContent = avg + '%';

  const nameEl = document.getElementById('obj-name');
  if (nameEl.textContent !== obj.title) nameEl.textContent = obj.title;

  nameEl.onblur = async function() {
    const newTitle = nameEl.textContent.trim();
    if (!newTitle || newTitle === obj.title) { nameEl.textContent = obj.title; return; }
    try {
      const res = await postData({ type:'rename_objective', obj_id:obj.id, new_title:newTitle });
      if (res.success) { obj.title = newTitle; state.objectives[0] = obj; showToast('✅ 目的已更新'); }
      else { showToast('❌ '+(res.message||'更新失敗'), true); nameEl.textContent = obj.title; }
    } catch(e) { showToast('❌ 網路錯誤', true); nameEl.textContent = obj.title; }
  };
  nameEl.onkeydown = function(e) {
    if (e.key==='Enter') { e.preventDefault(); nameEl.blur(); }
    if (e.key==='Escape') { nameEl.textContent = obj.title; nameEl.blur(); }
  };

  const year = new Date().getFullYear();
  document.getElementById('topbar-meta').textContent =
    `${year} 年度・${goals.length} 個目標・${state.actions.length} 項行動`;
}

function renderColumns() {
  const wrap = document.getElementById('three-col-wrap');
  wrap.innerHTML = '';

  // -- G column --
  const gCol = makeColumn('G', '支線目標', 'col-tag-g', state.goals.length);
  const gBody = gCol.querySelector('.col-body');

  if (!state.goals.length) {
    gBody.innerHTML = '<div class="col-empty"><div class="col-empty-icon">🎯</div><span>尚無支線目標</span></div>';
  } else {
    state.goals.forEach((goal, idx) => {
      const color = COLOR_MAP[goal.color] || COLOR_MAP.blue;
      const item = document.createElement('div');
      item.className = 'goal-item' + (selectedGoalId === goal.id ? ' active' : '');
      item.style.setProperty('--goal-color', color);
      item.innerHTML = `
        <div class="goal-item-num">目標 ${idx+1}</div>
        <div class="goal-item-name" contenteditable="true" spellcheck="false">${escHtml(goal.name)}</div>
        <div class="goal-item-bar"><div class="goal-item-fill" style="width:${goal.progress}%;background:${color}"></div></div>
        <div class="goal-item-meta">
          <span class="goal-item-pct" style="color:${color}">${goal.progress}%</span>
          <span class="goal-item-arrow">→</span>
        </div>
      `;
      // Click to select
      item.addEventListener('click', function(e) {
        if (e.target.classList.contains('goal-item-name')) return;
        selectedGoalId = selectedGoalId === goal.id ? null : goal.id;
        selectedStrategy = null;
        renderColumns();
      });
      // Inline edit goal name
      const nameEl = item.querySelector('.goal-item-name');
      nameEl.addEventListener('blur', async function() {
        const newName = nameEl.textContent.trim();
        if (!newName || newName === goal.name) { nameEl.textContent = goal.name; return; }
        try {
          const res = await postData({ type:'rename_goal', goal_id:goal.id, new_name:newName });
          if (res.success) { goal.name = newName; showToast('✅ 目標名稱已更新'); }
          else { showToast('❌ '+(res.message||'更新失敗'), true); nameEl.textContent = goal.name; }
        } catch(e) { showToast('❌ 網路錯誤', true); nameEl.textContent = goal.name; }
      });
      nameEl.addEventListener('keydown', function(e) {
        if (e.key==='Enter') { e.preventDefault(); nameEl.blur(); }
        if (e.key==='Escape') { nameEl.textContent = goal.name; nameEl.blur(); }
      });
      gBody.appendChild(item);
    });
  }

  // Add goal btn
  const gAddBtn = document.createElement('button');
  gAddBtn.className = 'btn-col-add';
  gAddBtn.textContent = '+ 新增目標';
  gAddBtn.onclick = openAddGoalModal;
  gCol.appendChild(gAddBtn);

  wrap.appendChild(gCol);

  // -- S column --
  const selectedGoal = state.goals.find(g => g.id === selectedGoalId);
  const goalActions = selectedGoalId ? state.actions.filter(a => a.goal_id === selectedGoalId) : [];
  const strategies = selectedGoalId
    ? [...new Set(goalActions.map(a => a.strategy_name || '（未分類）'))]
    : [];

  const sCount = selectedGoalId ? strategies.length : '';
  const sCol = makeColumn('S', '策略', 'col-tag-s', sCount);
  const sBody = sCol.querySelector('.col-body');

  if (!selectedGoalId) {
    sBody.innerHTML = '<div class="col-empty"><div class="col-empty-icon">←</div><span>請先選擇左側目標</span></div>';
  } else if (!strategies.length) {
    sBody.innerHTML = '<div class="col-empty"><div class="col-empty-icon">📋</div><span>此目標尚無策略</span></div>';
  } else {
    strategies.forEach((strat, idx) => {
      const acts = goalActions.filter(a => (a.strategy_name||'（未分類）') === strat);
      const item = document.createElement('div');
      item.className = 'strategy-item' + (selectedStrategy === strat ? ' active' : '');
      item.style.setProperty('--goal-color', COLOR_MAP[selectedGoal?.color] || COLOR_MAP.blue);
      item.innerHTML = `
        <div class="strategy-item-num">S${idx+1}</div>
        <div class="strategy-item-name" contenteditable="true" spellcheck="false">${escHtml(strat)}</div>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span class="strategy-item-count">${acts.length} 項行動</span>
          <span class="strategy-item-arrow">→</span>
        </div>
      `;
      item.addEventListener('click', function(e) {
        if (e.target.classList.contains('strategy-item-name')) return;
        selectedStrategy = selectedStrategy === strat ? null : strat;
        renderColumns();
      });
      // Inline edit strategy name
      const sNameEl = item.querySelector('.strategy-item-name');
      sNameEl.addEventListener('blur', async function() {
        const newName = sNameEl.textContent.trim();
        if (!newName || newName === strat) { sNameEl.textContent = strat; return; }
        try {
          const res = await postData({ type:'rename_strategy', goal_id:selectedGoalId, old_name:strat, new_name:newName });
          if (res.success) {
            state.actions.forEach(a => { if (a.goal_id === selectedGoalId && (a.strategy_name||'（未分類）') === strat) a.strategy_name = newName; });
            if (selectedStrategy === strat) selectedStrategy = newName;
            showToast('✅ 策略名稱已更新');
            renderColumns();
          } else { showToast('❌ '+(res.message||'更新失敗'), true); sNameEl.textContent = strat; }
        } catch(e) { showToast('❌ 網路錯誤', true); sNameEl.textContent = strat; }
      });
      sNameEl.addEventListener('keydown', function(e) {
        if (e.key==='Enter') { e.preventDefault(); sNameEl.blur(); }
        if (e.key==='Escape') { sNameEl.textContent = strat; sNameEl.blur(); }
      });
      sBody.appendChild(item);
    });
  }

  // Add action btn for S
  if (selectedGoalId) {
    const sAddBtn = document.createElement('button');
    sAddBtn.className = 'btn-col-add';
    sAddBtn.textContent = '+ 新增策略';
    sAddBtn.onclick = () => openAddActionModal(selectedGoalId, selectedGoal?.name || '');
    sCol.appendChild(sAddBtn);
  }

  wrap.appendChild(sCol);

  // -- M column --
  const mActions = selectedStrategy
    ? goalActions.filter(a => (a.strategy_name||'（未分類）') === selectedStrategy)
    : selectedGoalId ? goalActions : [];

  const mLabel = selectedStrategy ? selectedStrategy : (selectedGoalId ? '全部行動' : '');
  const mCount = selectedGoalId ? mActions.length : '';
  const mCol = makeColumn('M', '行動項目', 'col-tag-m', mCount);
  const mBody = mCol.querySelector('.col-body');

  if (!selectedGoalId) {
    mBody.innerHTML = '<div class="col-empty"><div class="col-empty-icon">←</div><span>請先選擇左側目標</span></div>';
  } else if (!mActions.length) {
    mBody.innerHTML = '<div class="col-empty"><div class="col-empty-icon">📝</div><span>尚無行動項目</span></div>';
  } else {
    const color = selectedGoal ? (COLOR_MAP[selectedGoal.color] || COLOR_MAP.blue) : COLOR_MAP.blue;
    mActions.forEach(a => {
      const barColor = a.status === '卡關' ? '#D44E28' : a.status === '完成' ? '#0D9373' : color;
      const item = document.createElement('div');
      item.className = 'action-item';
      item.innerHTML = `
        <div class="action-item-top">
          <span class="action-item-name" contenteditable="true" spellcheck="false">${escHtml(a.action_name)}</span>
          <span class="action-badge badge-${a.status}">${escHtml(a.status)}</span>
        </div>
        <div class="action-item-meta">
          ${a.assignee ? `<span class="action-meta-assignee">
            <span class="avatar" style="background:${avatarColor(a.assignee)}">${initials(a.assignee)}</span>
            ${escHtml(a.assignee)}
          </span>` : '<span></span>'}
          <div class="action-meta-right">
            ${a.due_date ? `<span class="action-meta-date">${fmtDate(a.due_date)}</span>` : ''}
            <div class="action-mini-bar"><div class="action-mini-fill" style="width:${a.progress}%;background:${barColor}"></div></div>
            <span class="action-pct" style="color:${barColor}">${a.progress}%</span>
          </div>
        </div>
      `;
      item.addEventListener('click', function(e) {
        if (e.target.classList.contains('action-item-name')) return;
        openEditModal(a.id);
      });
      // Inline edit action name
      const aNameEl = item.querySelector('.action-item-name');
      aNameEl.addEventListener('blur', async function() {
        const newName = aNameEl.textContent.trim();
        if (!newName || newName === a.action_name) { aNameEl.textContent = a.action_name; return; }
        try {
          const res = await postData({ type:'rename_action', action_id:a.id, new_name:newName });
          if (res.success) { a.action_name = newName; showToast('✅ 行動名稱已更新'); }
          else { showToast('❌ '+(res.message||'更新失敗'), true); aNameEl.textContent = a.action_name; }
        } catch(e) { showToast('❌ 網路錯誤', true); aNameEl.textContent = a.action_name; }
      });
      aNameEl.addEventListener('keydown', function(e) {
        if (e.key==='Enter') { e.preventDefault(); aNameEl.blur(); }
        if (e.key==='Escape') { aNameEl.textContent = a.action_name; aNameEl.blur(); }
      });
      mBody.appendChild(item);
    });
  }

  if (selectedGoalId) {
    const mAddBtn = document.createElement('button');
    mAddBtn.className = 'btn-col-add';
    mAddBtn.textContent = '+ 新增行動項目';
    mAddBtn.onclick = () => openAddActionModal(selectedGoalId, selectedGoal?.name || '', selectedStrategy || '');
    mCol.appendChild(mAddBtn);
  }

  wrap.appendChild(mCol);
}

function makeColumn(tag, title, tagClass, count) {
  const col = document.createElement('div');
  col.className = 'col-panel';
  col.innerHTML = `
    <div class="col-header">
      <span class="col-tag ${tagClass}">${tag}</span>
      <span class="col-title">${title}</span>
      <span class="col-count">${count !== '' ? count + ' 項' : ''}</span>
    </div>
    <div class="col-body"></div>
  `;
  return col;
}

// ── Edit Modal ──
function openEditModal(actionId) {
  const a = state.actions.find(x => x.id === actionId);
  if (!a) return;
  editingActionId = actionId;
  document.getElementById('edit-modal-title').textContent = a.action_name;
  document.getElementById('edit-modal-sub').textContent   = a.strategy_name;
  document.getElementById('edit-progress').value = a.progress;
  document.getElementById('edit-progress-display').textContent = a.progress + '%';
  document.getElementById('edit-status').value    = a.status;
  document.getElementById('edit-assignee').value  = a.assignee || '';
  document.getElementById('edit-due-date').value  = a.due_date || '';
  document.getElementById('edit-action-name').value = a.action_name || '';
  openOverlay('modal-edit');
}
function closeEditModal() { closeOverlay('modal-edit'); editingActionId = null; }
async function saveEditModal() {
  if (!editingActionId) return;
  const btn = document.getElementById('edit-save-btn');
  btn.disabled = true; btn.textContent = '儲存中';
  const payload = {
    type: 'update_action', id: editingActionId,
    progress: Number(document.getElementById('edit-progress').value),
    status:   document.getElementById('edit-status').value,
    assignee: document.getElementById('edit-assignee').value.trim(),
    due_date: document.getElementById('edit-due-date').value,
    action_name: document.getElementById('edit-action-name').value.trim(),
  };
  try {
    const res = await postData(payload);
    if (res.success) { showToast('✅ 更新成功'); closeEditModal(); await loadAndRender(); }
    else showToast('❌ '+(res.message||'更新失敗'), true);
  } catch(e) { showToast('❌ 網路錯誤', true); }
  finally { btn.disabled = false; btn.textContent = '儲存更新'; }
}

// ── Add Goal Modal ──
function openAddGoalModal() { openOverlay('modal-add-goal'); }
function closeAddGoalModal() { closeOverlay('modal-add-goal'); }
async function saveNewGoal() {
  const name = document.getElementById('new-goal-name').value.trim();
  const color = document.getElementById('new-goal-color').value;
  const progress = Number(document.getElementById('new-goal-progress').value);
  if (!name) { showToast('❌ 請填寫支線名稱', true); return; }
  const btn = document.getElementById('add-goal-save-btn');
  btn.disabled = true; btn.textContent = '新增中';
  const obj = state.objectives[0] || { id:'1' };
  const payload = {
    type:'add_goal', obj_id:obj.id, obj_title:obj.title,
    goal_id:'G'+Date.now(), goal_name:name, goal_progress:progress, goal_color:color,
    action_id:'A'+Date.now(),
  };
  try {
    const res = await postData(payload);
    if (res.success) {
      showToast('✅ 新增成功'); closeAddGoalModal();
      document.getElementById('new-goal-name').value = '';
      document.getElementById('new-goal-progress').value = 0;
      document.getElementById('new-goal-progress-display').textContent = '0%';
      await loadAndRender();
    } else showToast('❌ '+(res.message||'新增失敗'), true);
  } catch(e) { showToast('❌ 網路錯誤', true); }
  finally { btn.disabled = false; btn.textContent = '新增目標'; }
}

// ── Add Action Modal ──
function openAddActionModal(goalId, goalName, strategyName='') {
  addingToGoalId = goalId;
  document.getElementById('add-action-goal-name').textContent = goalName;
  document.getElementById('new-action-strategy').value = strategyName;
  document.getElementById('new-action-name').value = '';
  document.getElementById('new-action-assignee').value = '';
  document.getElementById('new-action-due').value = '';
  document.getElementById('new-action-progress').value = 0;
  document.getElementById('new-action-progress-display').textContent = '0%';
  document.getElementById('new-action-status').value = '未開始';
  openOverlay('modal-add-action');
}
function closeAddActionModal() { closeOverlay('modal-add-action'); addingToGoalId = null; }
async function saveNewAction() {
  const strategy = document.getElementById('new-action-strategy').value.trim();
  const name = document.getElementById('new-action-name').value.trim();
  if (!strategy || !name) { showToast('❌ 請填寫策略名稱與行動項目', true); return; }
  const btn = document.getElementById('add-action-save-btn');
  btn.disabled = true; btn.textContent = '新增中';
  const goal = state.goals.find(g => g.id === addingToGoalId);
  const obj = state.objectives[0] || { id:'1', title:'' };
  const payload = {
    type:'add_action', obj_id:obj.id, obj_title:obj.title,
    goal_id:addingToGoalId, goal_name:goal?.name||'', goal_progress:goal?.progress||0, goal_color:goal?.color||'blue',
    action_id:'A'+Date.now(), strategy_name:strategy, action_name:name,
    assignee:document.getElementById('new-action-assignee').value.trim(),
    due_date:document.getElementById('new-action-due').value,
    progress:Number(document.getElementById('new-action-progress').value),
    status:document.getElementById('new-action-status').value,
  };
  try {
    const res = await postData(payload);
    if (res.success) { showToast('✅ 新增行動成功'); closeAddActionModal(); await loadAndRender(); }
    else showToast('❌ '+(res.message||'新增失敗'), true);
  } catch(e) { showToast('❌ 網路錯誤', true); }
  finally { btn.disabled = false; btn.textContent = '新增行動'; }
}

// ── Overlay helpers ──
function openOverlay(id)  { document.getElementById(id).classList.add('open'); }
function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target===el) el.classList.remove('open'); });
});
document.addEventListener('keydown', e => {
  if (e.key==='Escape') document.querySelectorAll('.modal-overlay.open').forEach(el => el.classList.remove('open'));
});

// ── Toast ──
let toastTimer = null;
function showToast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast'+(isError?' error':'');
  requestAnimationFrame(() => t.classList.add('show'));
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Utils ──
function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(s) {
  if (!s) return '';
  const m = s.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (m) return parseInt(m[2])+'/'+parseInt(m[3]);
  const d = new Date(s);
  return isNaN(d) ? '' : (d.getMonth()+1)+'/'+d.getDate();
}

// ── Main ──
async function loadAndRender() {
  try {
    const data = await fetchData();
    state = data;
    render();
  } catch(e) {
    document.getElementById('three-col-wrap').innerHTML =
      `<div class="loading-overlay" style="grid-column:1/-1;color:#f5876e;">⚠️ 載入失敗：${escHtml(e.message)}</div>`;
  }
}

loadAndRender();
</script>
</body>
</html>
