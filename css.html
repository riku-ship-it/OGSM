<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --teal:   #0D9373;
  --blue:   #2B7FE0;
  --amber:  #C47A15;
  --coral:  #D44E28;
  --purple: #5B4FCF;
  --bg:     #F0F3F9;
  --bg2:    #FFFFFF;
  --bg3:    #E8ECF3;
  --surface:#FFFFFF;
  --border: rgba(0,0,0,.09);
  --border2:rgba(0,0,0,.14);
  --text:   #1A1D26;
  --text2:  #555E6E;
  --text3:  #8E96A3;
  --radius: 14px;
  --font:   'DM Sans', sans-serif;
  --mono:   'DM Mono', monospace;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Top Bar ── */
.topbar {
  background: rgba(240,243,249,.95);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  height: 52px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 300;
}
.topbar-logo {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .5px;
  color: var(--text);
  font-family: var(--mono);
  background: linear-gradient(135deg, var(--blue) 0%, var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.topbar-sep { width: 1px; height: 18px; background: var(--border2); }
.topbar-meta { font-size: 12px; color: var(--text3); flex: 1; }

.topbar-btn {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface);
  color: var(--text2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  font-family: var(--font);
  transition: all .15s;
}
.topbar-btn:hover { background: var(--bg3); color: var(--text); border-color: rgba(0,0,0,.22); }

.topbar-btn-primary {
  background: var(--blue);
  color: #fff;
  border-color: transparent;
}
.topbar-btn-primary:hover { background: #1a6fd4; color: #fff; border-color: transparent; }

/* ── Objective Section ── */
.obj-section {
  margin: 20px 24px 0;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 22px;
  position: relative;
  overflow: hidden;
}
.obj-section::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(83,75,183,.12) 0%, transparent 60%);
  pointer-events: none;
}
.obj-eyebrow {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.obj-line { flex: 1; height: 1px; background: var(--border); }
.obj-pct-badge {
  font-size: 13px;
  font-weight: 700;
  color: #5B4FCF;
  font-family: var(--mono);
}
.obj-name {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
  outline: none;
  cursor: text;
  border-radius: 6px;
  padding: 2px 4px;
  margin: -2px -4px;
  transition: background .15s;
}
.obj-name:hover { background: rgba(0,0,0,.04); }
.obj-name:focus { background: rgba(83,75,183,.08); box-shadow: 0 0 0 2px rgba(83,75,183,.3); }

/* ── Three-column layout ── */
.three-col-wrap {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 0;
  flex: 1;
  margin: 14px 24px 24px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  min-height: 0;
}

.col-panel {
  display: flex;
  flex-direction: column;
  min-height: 500px;
  border-right: 1px solid var(--border);
}
.col-panel:last-child { border-right: none; }

.col-header {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg3);
  flex-shrink: 0;
}
.col-tag {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 3px 9px;
  border-radius: 99px;
  font-family: var(--mono);
}
.col-tag-o { background: rgba(83,75,183,.1); color: #5B4FCF; border: 1px solid rgba(83,75,183,.3); }
.col-tag-g { background: rgba(43,127,224,.12); color: #1a6fd4; border: 1px solid rgba(43,127,224,.3); }
.col-tag-s { background: rgba(13,147,115,.12); color: #0a7a60; border: 1px solid rgba(13,147,115,.3); }
.col-tag-m { background: rgba(196,122,21,.12); color: #a06210; border: 1px solid rgba(196,122,21,.3); }

.col-title { font-size: 13px; font-weight: 600; color: var(--text2); }
.col-count { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-left: auto; }

.col-body {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.col-body::-webkit-scrollbar { width: 4px; }
.col-body::-webkit-scrollbar-track { background: transparent; }
.col-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

/* ── Goal Item ── */
.goal-item {
  padding: 13px 14px;
  border-radius: 10px;
  cursor: pointer;
  border: 1.5px solid transparent;
  background: rgba(0,0,0,.02);
  transition: all .18s;
  position: relative;
  overflow: hidden;
}
.goal-item::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--goal-color, var(--blue));
  border-radius: 99px 0 0 99px;
  opacity: 0;
  transition: opacity .18s;
}
.goal-item:hover { background: rgba(0,0,0,.04); border-color: var(--border2); }
.goal-item:hover::before { opacity: 1; }
.goal-item.active {
  background: color-mix(in srgb, var(--goal-color, var(--blue)) 12%, transparent);
  border-color: color-mix(in srgb, var(--goal-color, var(--blue)) 40%, transparent);
}
.goal-item.active::before { opacity: 1; }

.goal-item-num { font-size: 10px; font-weight: 600; color: var(--text3); font-family: var(--mono); margin-bottom: 4px; }
.goal-item-name {
  font-size: 13px; font-weight: 600; color: var(--text);
  line-height: 1.4; margin-bottom: 8px;
  outline: none; cursor: text;
  border-radius: 4px; padding: 1px 3px; margin: -1px -3px 6px;
}
.goal-item-name:hover { background: rgba(0,0,0,.04); }
.goal-item-name:focus { background: rgba(0,0,0,.06); box-shadow: 0 0 0 2px rgba(0,0,0,.1); }
.goal-item-bar { height: 3px; background: rgba(0,0,0,.1); border-radius: 99px; overflow: hidden; }
.goal-item-fill { height: 100%; border-radius: 99px; transition: width .4s ease; }
.goal-item-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
.goal-item-pct { font-size: 11px; font-weight: 700; font-family: var(--mono); }
.goal-item-arrow {
  font-size: 12px;
  color: var(--text3);
  opacity: 0;
  transition: opacity .18s, transform .18s;
}
.goal-item:hover .goal-item-arrow,
.goal-item.active .goal-item-arrow { opacity: 1; transform: translateX(2px); }

/* ── Strategy Item ── */
.strategy-item {
  padding: 12px 14px;
  border-radius: 10px;
  cursor: pointer;
  border: 1.5px solid transparent;
  background: rgba(0,0,0,.02);
  transition: all .18s;
}
.strategy-item:hover { background: rgba(0,0,0,.04); border-color: var(--border2); }
.strategy-item.active {
  background: color-mix(in srgb, var(--goal-color, var(--teal)) 12%, transparent);
  border-color: color-mix(in srgb, var(--goal-color, var(--teal)) 40%, transparent);
}
.strategy-item-num { font-size: 10px; font-weight: 600; color: var(--text3); font-family: var(--mono); margin-bottom: 4px; }
.strategy-item-name {
  font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; margin-bottom: 6px;
  outline: none; cursor: text;
  border-radius: 4px; padding: 1px 3px; margin: -1px -3px 4px;
}
.strategy-item-name:hover { background: rgba(0,0,0,.04); }
.strategy-item-name:focus { background: rgba(0,0,0,.06); box-shadow: 0 0 0 2px rgba(0,0,0,.1); }
.strategy-item-count { font-size: 11px; color: var(--text3); }
.strategy-item-arrow { font-size: 12px; color: var(--text3); opacity: 0; transition: opacity .18s; }
.strategy-item:hover .strategy-item-arrow,
.strategy-item.active .strategy-item-arrow { opacity: 1; }

/* ── Action Item ── */
.action-item {
  padding: 12px 14px;
  border-radius: 10px;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: rgba(0,0,0,.02);
  transition: all .18s;
}
.action-item:hover { background: rgba(0,0,0,.04); border-color: var(--border2); }
.action-item-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
.action-item-name {
  font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; flex: 1;
  outline: none; cursor: text;
  border-radius: 4px; padding: 1px 3px; margin: -1px -3px;
}
.action-item-name:hover { background: rgba(0,0,0,.04); }
.action-item-name:focus { background: rgba(0,0,0,.06); box-shadow: 0 0 0 2px rgba(0,0,0,.1); }
.action-badge {
  font-size: 10px; font-weight: 700; padding: 2px 8px;
  border-radius: 99px; white-space: nowrap; flex-shrink: 0;
}
.badge-未開始 { background: rgba(0,0,0,.07); color: var(--text3); }
.badge-進行中 { background: rgba(43,127,224,.12); color: #1a6fd4; }
.badge-完成   { background: rgba(13,147,115,.12); color: #0a7a60; }
.badge-卡關   { background: rgba(212,78,40,.12);  color: #b83d1e; }

.action-item-meta { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.action-meta-assignee { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text3); flex-shrink: 1; min-width: 0; overflow: hidden; white-space: nowrap; }
.avatar {
  width: 18px; height: 18px; border-radius: 50%;
  font-size: 8px; font-weight: 700; color: #fff;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.action-meta-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; width: 55%; }
.action-meta-date { font-size: 11px; color: var(--text3); font-family: var(--mono); white-space: nowrap; flex-shrink: 0; }
.action-mini-bar { flex: 1; height: 3px; background: rgba(0,0,0,.1); border-radius: 99px; overflow: hidden; }
.action-mini-fill { height: 100%; border-radius: 99px; transition: width .4s; }
.action-pct { font-size: 10px; font-weight: 700; font-family: var(--mono); color: var(--text3); flex-shrink: 0; }

/* ── Empty / Hint states ── */
.col-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 32px;
  color: var(--text3);
  font-size: 12px;
  text-align: center;
}
.col-empty-icon { font-size: 28px; opacity: .3; }
.col-hint {
  margin: 10px;
  padding: 12px;
  border: 1px dashed var(--border2);
  border-radius: 10px;
  font-size: 12px;
  color: var(--text3);
  text-align: center;
}

/* ── Add Buttons ── */
.btn-col-add {
  display: flex; align-items: center; justify-content: center; gap: 5px;
  margin: 6px 10px 10px;
  padding: 9px;
  border: 1.5px dashed var(--border2);
  border-radius: 10px;
  font-size: 12px; font-weight: 500;
  color: var(--text3);
  background: none;
  cursor: pointer;
  font-family: var(--font);
  transition: all .15s;
  flex-shrink: 0;
}
.btn-col-add:hover { border-color: rgba(0,0,0,.3); color: var(--text2); background: rgba(0,0,0,.03); }

/* ── Loading ── */
.loading-overlay {
  display: flex; align-items: center; justify-content: center;
  min-height: 200px; flex-direction: column; gap: 12px;
  color: var(--text3); font-size: 13px;
}
.spinner {
  width: 28px; height: 28px;
  border: 2.5px solid var(--border2);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.65);
  backdrop-filter: blur(8px);
  z-index: 500;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }

.modal {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 16px;
  width: 100%; max-width: 460px;
  box-shadow: 0 24px 64px rgba(0,0,0,.18);
  transform: translateY(14px) scale(.98);
  transition: transform .22s cubic-bezier(.34,1.56,.64,1);
  overflow: hidden;
}
.modal-overlay.open .modal { transform: translateY(0) scale(1); }

.modal-header {
  padding: 20px 22px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
}
.modal-title { font-size: 15px; font-weight: 700; color: var(--text); }
.modal-sub   { font-size: 12px; color: var(--text3); margin-top: 3px; }
.modal-close {
  background: rgba(0,0,0,.06); border: none; cursor: pointer;
  color: var(--text3); font-size: 16px; line-height: 1;
  width: 28px; height: 28px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s; flex-shrink: 0;
}
.modal-close:hover { background: rgba(0,0,0,.12); color: var(--text); }

.modal-body { padding: 18px 22px; display: flex; flex-direction: column; gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-label { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: .5px; text-transform: uppercase; }
.form-input, .form-select {
  width: 100%; padding: 9px 12px;
  background: var(--bg3);
  border: 1.5px solid var(--border2);
  border-radius: 8px;
  font-size: 13px; font-family: var(--font);
  color: var(--text);
  transition: border-color .15s; outline: none;
}
.form-input:focus, .form-select:focus { border-color: var(--blue); }
.form-select option { background: var(--bg2); }
.progress-row { display: flex; align-items: center; gap: 10px; }
.progress-row input[type=range] { flex: 1; accent-color: var(--blue); cursor: pointer; }
.pct-display { font-size: 13px; font-weight: 700; font-family: var(--mono); color: var(--text2); min-width: 36px; text-align: right; }

.modal-footer {
  padding: 12px 22px 20px;
  display: flex; gap: 10px; justify-content: flex-end;
}
.btn { padding: 9px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all .15s; font-family: var(--font); }
.btn:disabled { opacity: .45; cursor: not-allowed; }
.btn-cancel { background: var(--surface); color: var(--text2); border: 1px solid var(--border2); }
.btn-cancel:hover:not(:disabled) { background: var(--bg3); }
.btn-save   { background: var(--blue); color: #fff; }
.btn-save:hover:not(:disabled)   { background: #1a6fd4; }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(12px);
  background: var(--surface);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 10px 20px; border-radius: 99px;
  font-size: 13px; font-weight: 500;
  opacity: 0; pointer-events: none;
  transition: opacity .25s, transform .25s; z-index: 600; white-space: nowrap;
  box-shadow: 0 8px 24px rgba(0,0,0,.3);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error { background: #7f1d1d; border-color: #b91c1c; color: #fca5a5; }
</style>
